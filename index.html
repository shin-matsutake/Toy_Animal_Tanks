            if (visualType === "gas") emoji = "🛢️";
            if (visualType === "bomb") emoji = "💣";
            ctx.fillText(emoji, s.x, s.y + 8); // 1.5倍化に伴う表示座標微調整
        }

        class Bullet {
            constructor(x, y, vx, vy, color, type, owner) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.color = color; this.type = type; this.owner = owner;
                this.radius = 5; this.gravity = 0.25; this.isDead = false; this.bounceCount = 0; this.isFrogSubBullet = false; 
                
                if (this.type === 5 && this.owner.charKey === "BR-03") { this.gravity = 0.45; this.radius = 8; }
                if (this.type === 5 && this.owner.charKey === "PG-08") { this.gravity = 0.25; this.radius = 7; }
                if (this.type === 5 && this.owner.charKey === "XX-10") { this.radius = 8; }
                if (this.type === 5 && this.owner.charKey === "GK-13") { this.radius = 7; }
                this.gravity *= (selectedStageObj.gravity || 1.0); // 🌟 ステージ固有の重力係数を反映（月面は軽く、惑星Xは重く等）
            }

            update(windPower) {
                let windFactor = (this.type === 3) ? 0 : 0.15;
                if (this.type === 5 && this.owner.charKey === "BR-03") windFactor = 0.02; 
                
                this.vx += windPower * windFactor * 0.05;
                this.vy += this.gravity;
                let oldX = this.x, oldY = this.y;
                let newX = this.x + this.vx, newY = this.y + this.vy;

                // 🌟 すり抜け防止：1フレームでの移動距離が長いと、薄い壁の場合「移動前と移動後の間」にすっぽり収まり、
                // 着地点だけのチェックでは衝突を検知できないことがあった。経路を3pxごとに刻んでチェックする
                // (オバケの固有弾は地形貫通が仕様のため対象外)
                let isPiercing = (this.type === 5 && this.owner.charKey === "XX-10");
                let moveDist = Math.hypot(newX - oldX, newY - oldY);
                let steps = Math.max(1, Math.ceil(moveDist / 3));
                let hitDuringMove = false;
                if (!isPiercing) {
                    for (let s = 1; s <= steps; s++) {
                        let t = s / steps;
                        let checkX = oldX + (newX - oldX) * t;
                        let checkY = oldY + (newY - oldY) * t;
                        if (isGround(checkX, checkY)) { this.x = checkX; this.y = checkY; hitDuringMove = true; break; }
                    }
                }
                if (!hitDuringMove) { this.x = newX; this.y = newY; }

                if (this.x < -100 || this.x >= canvas.width + 100 || this.y > canvas.height + 100) { this.isDead = true; return; }

                let tx = Math.floor(this.x); let hitTerrain = false;
                if (tx >= 0 && tx < canvas.width && isGround(this.x, this.y)) {
                    if (!(this.type === 5 && this.owner.charKey === "XX-10")) hitTerrain = true;
                }

                let hitTree = null;
                if (!(this.type === 5 && this.owner.charKey === "XX-10")) {
                    for (let tree of treeObjects) {
                        if (Math.abs(this.x - tree.x) < (tree.w / 2) && this.y >= (tree.y - tree.h) && this.y <= tree.y) {
                            hitTree = tree; break;
                        }
                    }
                }

                let hitTank = null;
                window.G.tanks.forEach(t => {
                    if (t.hp > 0 && t.id !== this.owner.id && t.hasSpawned) {
                        let dist = Math.hypot(t.x - this.x, this.y - (t.y - 22));
                        if (dist < (this.radius + 22)) hitTank = t;
                    }
                });

                // 🎁 アイテム箱への直撃：弾が飛んできた方向の逆へ中身をドロップして箱を開ける
                for (let i = supplyItems.length - 1; i >= 0; i--) {
                    let item = supplyItems[i];
                    if (item.state === 'box' && Math.hypot(this.x - item.x, this.y - item.y) < (this.radius + 16)) {
                        let moveLen = Math.hypot(this.vx, this.vy) || 1;
                        openItemBox(item, -this.vx / moveLen, -this.vy / moveLen);
                        if (!(this.type === 5 && this.owner.charKey === "XX-10")) { this.isDead = true; return; }
                        break;
                    }
                }

                if (this.type === 5 && this.owner.charKey === "XX-10") {
                    if (hitTank) { this.explode(this.x, this.y, hitTank); }
                    return; 
                }

                // 🐶 イヌ固有弾：索敵範囲を少し狭めてマイルドに（400 → 260）
                if (this.type === 5 && this.owner.charKey === "DO-04" && this.vy >= 0) {
                    let closestEnemy = null; let minDist = 260; 
                    window.G.tanks.forEach(t => {
                        if (t.hp > 0 && t.id !== this.owner.id && (selectedRuleMode === 'solo' || t.team !== this.owner.team) && t.hasSpawned) {
                            let d = Math.hypot(t.x - this.x, t.y - this.y);
                            if (d < minDist) { minDist = d; closestEnemy = t; }
                        }
                    });
                    if (closestEnemy) {
                        let dx = closestEnemy.x - this.x; let dy = (closestEnemy.y - 12) - this.y;
                        let dist = Math.hypot(dx, dy);
                        if (dist > 0) {
                            this.vx = (this.vx * 0.82) + (dx / dist) * 3.5 * 0.06;
                            this.vy = (this.vy * 0.82) + (dy / dist) * 3.5 * 0.06;
                        }
                    }
                }

                if (this.type === 5 && this.owner.charKey === "GK-13") {
                    if (hitTank || hitTerrain || hitTree) {
                        // 🌟 衝突検出時点の(x,y)は既に地表付近なので、terrain[tx]の代わりにそのまま使う
                        let currentSurfaceY = this.y;
                        let baseDamage = 39 - (this.bounceCount * 7); 
                        if (baseDamage < 7) baseDamage = 7;

                        let currentRadius = (this.bounceCount >= 4) ? 13 : 0;
                        damageTerrain(this.x, currentSurfaceY, currentRadius, baseDamage, null, this.owner);

                        this.bounceCount++;
                        if (this.bounceCount >= 5) { this.isDead = true; } 
                        else {
                            // 🌟 修正：findSurfaceYで真上にスキャンして位置を決めると、天井にぶつかった際に
                            // 地形の反対側(外)へワープするバグがあった。移動方向の逆向きに少し戻すだけにする
                            let wasFalling = this.vy >= 0; // 天井にぶつかった場合はfalse(上昇中に衝突)
                            if (hitTerrain) {
                                let backDist = 12; // 🌟 4→12に増加。段差等での短時間の多段バウンド連鎖を緩和
                                let moveLen = Math.hypot(this.vx, this.vy) || 1;
                                this.x -= (this.vx / moveLen) * backDist;
                                this.y -= (this.vy / moveLen) * backDist;
                            }
                            // 🌟 跳ね返る方向も、床なら上向き・天井なら下向きにする(常に上向き決め打ちだったのを修正)
                            let randomAngle = wasFalling
                                ? -Math.PI/4 - Math.random() * Math.PI/2   // 床：上向きに跳ねる
                                : Math.PI/4 + Math.random() * Math.PI/2;  // 天井：下向きに跳ねる
                            let bounceSpeed = 4 + Math.random() * 5; 
                            this.vx = Math.cos(randomAngle) * bounceSpeed;
                            this.vy = Math.sin(randomAngle) * bounceSpeed;
                        }
                        return;
                    }
                    return;
                }

                if (this.type === 5 && this.owner.charKey === "PG-08") {
                    // 🧊 直撃：ダメージではなく相手のガソリンを全て奪う
                    if (hitTank) { hitTank.gas = 0; this.isDead = true; return; }
                    if (hitTerrain || this.isCurling) {
                        this.isCurling = true;
                        // 🌟 修正：findSurfaceYで真上にスキャンして位置を決めると、天井にぶつかった際に
                        // 地形の反対側(外)へワープするバグがあった(ゴリラと同じ原因)。
                        // 衝突地点(this.y)をそのまま使い、移動方向の逆向きに少し戻すだけにする
                        let backDist = 4;
                        let moveLen = Math.hypot(this.vx, this.vy) || 1;
                        this.x -= (this.vx / moveLen) * backDist;
                        this.y -= (this.vy / moveLen) * backDist;
                        this.vy = 0;

                        // 局所的な傾斜（左右2点の地表Yの差）で下り坂なら加速、上り坂なら減速する
                        let tx2 = Math.floor(this.x); let slope = 0;
                        if (tx2 > 2 && tx2 < canvas.width - 2) {
                            slope = findSurfaceY(tx2 + 2, this.y) - findSurfaceY(tx2 - 2, this.y);
                        }
                        this.vx += slope * 0.03; // 🥌 斜面なりに加減速(下り=slope>0で加速方向)
                        this.vx *= 0.988; // 🥌 カーリングのようにほぼ減衰せず転がり続ける(摩擦はごくわずか)

                        // 🧊 地形は削らず、通過した軌跡に氷結ゾーンを残す(間引きながら)
                        this.curlTick = (this.curlTick || 0) + 1;
                        if (this.curlTick % 5 === 0) iceZones.push({ x: this.x, y: this.y, r: 16 });

                        this.curlDistance = (this.curlDistance || 0) + Math.abs(this.vx);
                        if (Math.abs(this.vx) < 0.4 || this.curlDistance > 900 || this.curlTick > 500) {
                            this.isDead = true; // 🌟 explode()を経由しない(旧仕様の大爆発を完全に回避)
                        }
                        return;
                    }
                    return;
                }

                if (hitTank || hitTerrain || hitTree) { 
                    this.explode(this.x, this.y, hitTank); 
                }
            }

            explode(cx, cy, directHitTank = null) {
                this.isDead = true;

                if (this.isFrogSubBullet) { 
                    damageTerrain(cx, cy, 20, 20, window.G?.frogTracker, this.owner); 
                    return; 
                }
                if (this.type === 0) { damageTerrain(cx, cy, 33, 33, null, this.owner); return; }
                if (this.type === 1) { damageTerrain(cx, cy, 20, 59, null, this.owner); return; }
                if (this.type === 2) { damageTerrain(cx, cy, 26, 20, null, this.owner); return; }
                if (this.type === 3) { damageTerrain(cx, cy, 59, 46, null, this.owner); return; }
                if (this.type === 4) { 
                    this.owner.x = cx; this.owner.y = cy; this.owner.checkGroundStatus();
                    setGameMessage(`🌀 ワープ弾着弾！自身をテレポートさせました。`); return;
                }

                let char = this.owner.charKey;
                
                if (char === "CA-01") { 
                    damageTerrain(cx, cy, 33, 29, null, this.owner);
                    if (this.owner.nekoCombo) {
                        window.G.isShooting = false;
                        setGameMessage(`🐾【ネコ】固有技発動！2発目の通常弾をチャージして発射してください！`);
                    } else { window.G.isShooting = false; window.G.nextTurn(); }
                    return;
                }
                if (char === "RA-02") { 
                    let totalDmg = damageTerrain(cx, cy, 39, 24, null, this.owner);
                    if (totalDmg > 0) { this.owner.hp = Math.min(this.owner.maxHp, this.owner.hp + totalDmg); } 
                    else { this.owner.hp = Math.min(this.owner.maxHp, this.owner.hp + 5); }
                    return;
                }
                if (char === "BR-03") { damageTerrain(cx, cy, 65, 85, null, this.owner); return; }
                if (char === "DO-04") { damageTerrain(cx, cy, 36, 34, null, this.owner); return; }
                if (char === "RT-05") { 
                    damageTerrain(cx, cy, 39, 13, null, this.owner); let deepY = findSurfaceY(cx, cy);
                    this.owner.x = cx; this.owner.y = deepY; this.owner.checkGroundStatus(); return;
                }
                if (char === "XX-10") { damageTerrain(cx, cy, 39, 46, null, this.owner); return; }
                if (char === "PG-08") { return; } // 🧊 氷結ゾーン方式に移行済み。explode()経由では何もしない(念のための保険)
                
                if (char === "CR-07") { 
                    visualEffects.push(new RingEffect(cx, cy, 163, "rgba(120, 0, 255, 0.7)", "pull")); 
                    window.G.tanks.forEach(t => {
                        if (t.hp > 0 && t.hasSpawned) {
                            let dist = Math.hypot(t.x - cx, (t.y - 22) - cy);
                            if (dist < 163) {
                                if (!checkLineOfSight(cx, cy, t.x, t.y - 22)) return;
                                t.hp = Math.max(0, t.hp - Math.floor(33 * (163 - dist) / 163));
                                t.x += (t.x > cx ? -1 : 1) * (60 * (163 - dist) / 163); t.checkGroundStatus();
                            }
                        }
                    });
                    return;
                }
                
                if (char === "ML-06") { 
                    cx = Math.floor(cx);
                    // 🌟 仕様通り：直撃時のみ35ダメージ。爆風(周囲を巻き込むダメージ)は無し
                    if (directHitTank && directHitTank.hp > 0) {
                        directHitTank.hp = Math.max(0, directHitTank.hp - 35);
                    }
                    if (cx >= 0 && cx < canvas.width) {
                        for (let x = Math.max(0, cx - 25); x < Math.min(canvas.width, cx + 25); x++) {
                            // 🌟 ドリルのイメージ：半円形(丸みのある穴)ではなく、中心が最も深いV字(直線的な傾斜)に変更
                            let depth = (25 - Math.abs(x - cx)) * 2.5;
                            let oldSurfaceY = findSurfaceY(x, cy);
                            reshapeColumn(x, cy, Math.min(canvas.height - 10, oldSurfaceY + depth));
                        }
                    }
                    window.G.tanks.forEach(t => { if(t.hasSpawned) t.checkGroundStatus(); });
                    return;
                }
                
                // 🦝 タヌキ固有：角度反転デグレード修正、盛り上げカット、木を頑丈に(34x75 → 50x90)
                if (char === "RD-09") { 
                    // 🌟 爆破で地形を削ると木の根本ごと穴が開き、浮いて見える原因になるため廃止。
                    // タヌキは直接ダメージではなく罠(トラップアップル)による設置系キャラとして機能する

                    // 🌟 木は「弾が飛んできた方向」に伸びる＝進行方向(vx,vy)の逆向き。
                    // 真上から落下→直立、横から浅い角度で当たった(=壁に当たった)→ほぼ水平、という挙動が自然に出る
                    let treeTilt = Math.atan2(-this.vx, this.vy);

                    // 🌟 根本は実際の着弾点(cx,cy)そのもの（壁に当たった場合、壁の上ではなく実際に当たった側面が根本になる）
                    let tree = { x: cx, y: cy, w: 50, h: 90, angle: treeTilt };
                    treeObjects.push(tree);
                    setTrunkGround(tree, 1); // 🌟 実際に足場として機能させる(木の上に乗る／横向きなら橋として渡れる)
                    
                    let currentLimit = MapConfigs[selectedStageObj.type]?.maxItems ?? 3;
                    if (supplyItems.length < currentLimit) {
                        let lx = Math.max(0, cx - 35);
                        supplyItems.push({ x: Math.max(10, cx - 35), y: findSurfaceY(lx, cy) - 15, type: "trap_apple", ownerId: this.owner.id });
                    }
                    if (supplyItems.length < currentLimit) {
                        let rx = Math.min(canvas.width - 1, cx + 35);
                        supplyItems.push({ x: Math.min(canvas.width - 10, cx + 35), y: findSurfaceY(rx, cy) - 15, type: "trap_apple", ownerId: this.owner.id });
                    }
                    window.G.tanks.forEach(t => { if(t.hasSpawned) t.checkGroundStatus(); });
                    return;
                }

                if (char === "TT-12") { 
                    cx = Math.floor(cx); cy = Math.floor(cy);
                    // 🌟 敵に直撃した場合、着弾点は敵の体の高さ(地面より上)になってしまうため、
                    // 実際の地面表面にスナップしてからドームを生成する(そうしないと床が宙に浮き、下から普通に抜け出せてしまう)
                    cy = findSurfaceY(cx, cy);
                    // 🐢 甲羅ドーム（楕円形）：横幅=戦車3台弱、高さ=戦車2台弱(戦車64px基準)を目安にサイズ調整
                    let outerRx = 90, outerRy = 118, shellRatio = 0.71;
                    let innerRx = Math.floor(outerRx * shellRatio), innerRy = Math.floor(outerRy * shellRatio), floorT = 14;

                    // terrainMap更新：上半分のみが対象（殻は楕円環状、内側は空洞）
                    for (let x = Math.max(0, cx - outerRx); x < Math.min(canvas.width, cx + outerRx); x++) {
                        for (let y = Math.max(0, cy - outerRy); y <= cy; y++) {
                            let dx = x - cx, dy = y - cy;
                            let normOuter = (dx * dx) / (outerRx * outerRx) + (dy * dy) / (outerRy * outerRy);
                            if (normOuter > 1) continue;
                            let normInner = (dx * dx) / (innerRx * innerRx) + (dy * dy) / (innerRy * innerRy);
                            terrainMap[x][y] = (normInner >= 1) ? 1 : 0;
                        }
                    }
                    // 床：地形の有無に関わらず強制的に作る（谷間で発動すれば橋としても機能する）
                    for (let x = Math.max(0, cx - innerRx); x < Math.min(canvas.width, cx + innerRx); x++) {
                        for (let y = cy; y < Math.min(canvas.height, cy + floorT); y++) terrainMap[x][y] = 1;
                    }

                    // 見た目：内部をくり抜く→殻を描く→床を描く
                    mapCtx.save(); mapCtx.globalCompositeOperation = 'destination-out';
                    mapCtx.beginPath(); mapCtx.moveTo(cx - innerRx, cy); mapCtx.ellipse(cx, cy, innerRx, innerRy, 0, Math.PI, 0, false); mapCtx.closePath(); mapCtx.fill();
                    mapCtx.restore();

                    mapCtx.save();
                    let shellPath = new Path2D();
                    shellPath.moveTo(cx - outerRx, cy);
                    shellPath.ellipse(cx, cy, outerRx, outerRy, 0, Math.PI, 0, false);
                    shellPath.lineTo(cx + innerRx, cy);
                    shellPath.ellipse(cx, cy, innerRx, innerRy, 0, 0, Math.PI, true);
                    shellPath.closePath();
                    mapCtx.clip(shellPath, 'evenodd');
                    mapCtx.fillStyle = "#4a7c3f"; mapCtx.fillRect(cx - outerRx, cy - outerRy, outerRx * 2, outerRy);
                    if (currentStageImg && currentStageImg.complete && currentStageImg.width > 0) {
                        mapCtx.drawImage(currentStageImg, 0, 0, canvas.width, canvas.height);
                    }
                    mapCtx.restore();

                    mapCtx.save(); mapCtx.beginPath(); mapCtx.rect(cx - innerRx, cy, innerRx * 2, floorT); mapCtx.clip();
                    mapCtx.fillStyle = "#6b8e23"; mapCtx.fillRect(cx - innerRx, cy, innerRx * 2, floorT);
                    if (currentStageImg && currentStageImg.complete && currentStageImg.width > 0) {
                        mapCtx.drawImage(currentStageImg, 0, 0, canvas.width, canvas.height);
                    }
                    mapCtx.restore();

                    window.G.tanks.forEach(t => { if(t.hasSpawned) t.checkGroundStatus(); });
                    return;
                }
                
                if (char === "WF-14") { 
                    visualEffects.push(new RingEffect(cx, cy, 163, "rgba(0, 255, 255, 0.8)", "wave")); 
                    window.G.tanks.forEach(t => {
                        if (t.hp > 0 && t.hasSpawned) {
                            let dist = Math.hypot(t.x - cx, (t.y - 22) - cy);
                            if (dist < 163) {
                                if (!checkLineOfSight(cx, cy, t.x, t.y - 22)) return;
                                t.hp = Math.max(0, t.hp - Math.floor(20 * (163 - dist) / 163));
                                t.x += (t.x > cx ? 1 : -1) * (150 * (163 - dist) / 163); t.checkGroundStatus();
                            }
                        }
                    });
                    return;
                }
                
                // 🐸 カエル固有：拡散幅を20度狭め「100度拡散」にナロー化
                if (char === "FG-11") {
                    damageTerrain(cx, cy, 26, 26, null, this.owner);
                    let tx = Math.floor(cx);
                    let leftY = findSurfaceY(Math.max(0, tx - 5), cy);
                    let rightY = findSurfaceY(Math.min(canvas.width - 1, tx + 5), cy);
                    let surfaceAngle = Math.atan2(rightY - leftY, 10); 
                    let normalAngle = surfaceAngle - Math.PI / 2;

                    if (window.G) window.G.frogTracker = { hasHitTanks: [] };
                    
                    let subCount = 5;
                    for (let i = 0; i < subCount; i++) {
                        let progress = (i / (subCount - 1)) - 0.5;
                        let spread = normalAngle + progress * (Math.PI * 100 / 180) + (Math.random() * 0.2 - 0.1); 
                        let subSpeed = 5 + Math.random() * 4;
                        let subB = new Bullet(cx, cy - 6, Math.cos(spread) * subSpeed, Math.sin(spread) * subSpeed, this.owner.color, 5, this.owner);
                        subB.isFrogSubBullet = true; 
                        bullets.push(subB);
                    }
                    return;
                }
                damageTerrain(cx, cy, 33, 33, null, this.owner);
            }
        }

        class Tank {
            constructor(x, key, name, id, isCpu, team, num) {
                let s = CharacterData[key]; this.x = x; this.id = id; this.charKey = key; this.color = s.color; this.name = name;
                this.isCpu = isCpu; this.team = team; this.num = num; this.y = -100; this.isDropping = false; this.vy = 0; this.hasSpawned = false; 
                this.maxHp = s.hp; this.hp = s.hp; this.maxGas = s.gas; this.gas = s.gas; this.climbLimit = s.climb;
                this.facingDir = num <= 4 ? 1 : -1; this.angle = this.facingDir === 1 ? -Math.PI / 4 : -3 * Math.PI / 4;
                this.chargePower = 2; this.chargeDirection = 1; this.isCharging = false;
                this.ammo = { wp1: 1, wp2: 1, wp3: 1, wp4: 1, wp5: 1 }; this.lastPower = null;
                this.nekoCombo = false;
            }
            
            checkGroundStatus() {
                if (!this.hasSpawned) return;
                let tx = Math.floor(this.x);
                // 🌟 自分のY座標を起点に「今いる足場」の地表を探す（空中足場・オーバーハング対応）
                if (tx >= 0 && tx < canvas.width) { if (this.y < findSurfaceY(tx, this.y) - 2) this.isDropping = true; }
            }

            updatePosition(checkCliff = false, prevX = 0) {
                if (!this.hasSpawned) return;
                let tx = Math.floor(this.x);
                if (tx >= 0 && tx < canvas.width) {
                    let targetY = findSurfaceY(tx, this.y);
                    if (checkCliff && (this.y - targetY > this.climbLimit)) { this.x = prevX; return; }
                    if (this.y < targetY - 4) { this.isDropping = true; } 
                    else if (this.y >= targetY - 4) { this.y = targetY; this.vy = 0; this.isDropping = false; }
                } else { this.y += 4; }
                
                if (this.y >= canvas.height + 40 || this.x < -40 || this.x > canvas.width + 40) {
                    if (this.hp > 0) {
                        this.hp = 0; setGameMessage(`💀【落下死】${this.name} がリングアウトしました。`);
                        // 🌟 リングアウトは何フレームもかけて発生するため、次のターンまで勝敗判定を待つと
                        // 「本当はもう決着しているのに、まだ続いているように見える」空白期間が生まれる。
                        // ここで即座にチェックする
                        if (window.G && !window.G.isGameOver) {
                            let alive = window.G.tanks.filter(t => t.hp > 0);
                            let isFinished = (selectedRuleMode === 'team') ? new Set(alive.map(t => t.team)).size <= 1 : alive.length <= 1;
                            if (isFinished) window.G.checkGameOver();
                        }
                    }
                }
            }

            constrainAngle() {
                if (this.facingDir === 1) {
                    this.angle = Math.max(-Math.PI/2, Math.min(Math.PI/2, this.angle));
                } else {
                    if (this.angle < -Math.PI * 1.5) this.angle += Math.PI * 2;
                    if (this.angle > Math.PI * 0.5) this.angle -= Math.PI * 2;
                    if (this.angle > -Math.PI / 2 && this.angle <= Math.PI * 0.5) {
                        this.angle = this.angle > 0 ? Math.PI * 0.5 : -Math.PI / 2;
                    } else {
                        this.angle = Math.max(-Math.PI * 1.5, Math.min(-Math.PI / 2, this.angle));
                    }
                }
            }

            update(myTurn) {
                if (!this.hasSpawned) return;
                if (this.isDropping) { this.vy += 0.25 * (selectedStageObj.gravity || 1.0); this.y += this.vy; this.updatePosition(false); return; }
                this.updatePosition(false); if (this.hp <= 0) return;

                // 🎁 アイテムの回収判定を1.5倍に拡張（22 → 32）。重力更新はGame.update()側でフレームに1回だけ行う
                for (let i = supplyItems.length - 1; i >= 0; i--) {
                    let item = supplyItems[i];
                    if (Math.hypot(this.x - item.x, (this.y - 11) - item.y) < 34) {
                        if (item.state === 'box') {
                            // 🎁 箱を踏んだ：進行方向(向いている方向)へ中身をドロップする
                            openItemBox(item, this.facingDir, -0.3);
                            continue;
                        }
                        supplyItems.splice(i, 1);
                        if (item.type === "apple") this.hp = Math.min(this.maxHp, this.hp + 25);
                        else if (item.type === "medkit") this.hp = Math.min(this.maxHp, this.hp + 50);
                        else if (item.type === "gas") this.gas = Math.min(this.maxGas, this.gas + 50);
                        else if (item.type === "trap_apple") {
                            if (item.ownerId === this.id || (window.G?.tanks.find(t=>t.id===item.ownerId)?.team === this.team && selectedRuleMode === 'team')) {
                                this.hp = Math.min(this.maxHp, this.hp + 25); 
                            } else { this.hp = Math.max(0, this.hp - 13); }
                        }
                    }
                }

                if (!myTurn) return;

                this.constrainAngle();

                if (this.isCharging && !this.isCpu) {
                    let pct = ((this.chargePower - 2) / 10) * 100;
                    document.getElementById("powerBar").style.setProperty("--pct", `${pct}%`);
                    document.getElementById("powerText").textContent = `パワー: ${Math.floor(pct)}%`;
                }

                if (this.isCpu) {
                    if (!window.G.isShooting && bullets.length === 0) {
                        if (!this.cpuTurnState) { this.cpuTurnState = 'deciding'; this.cpuWatchdog = 0; }

                        // 🌟 監視タイマー：理由を問わず、どの状態で何フレーム経っても一定時間(約10秒)で強制的にパスする
                        this.cpuWatchdog = (this.cpuWatchdog || 0) + 1;
                        if (this.cpuWatchdog > 600) {
                            this.cpuTurnState = null; this.isCharging = false;
                            window.G.nextTurn();
                            return;
                        }

                        // 🧭 フェーズ1：ターゲット決定＋動くべきか判断
                        if (this.cpuTurnState === 'deciding') {
                            let target = window.G.tanks.find(t => t.hp > 0 && t.id !== this.id && (selectedRuleMode === 'solo' || t.team !== this.team) && t.hasSpawned);
                            if (!target) target = window.G.tanks.find(t => t.hp > 0 && t.id !== this.id && t.hasSpawned);
                            this.cpuTarget = target;
                            let difficulty = this.cpuDifficulty || 'normal';
                            this.cpuDifficultyCached = difficulty;

                            let moveTargetX = (difficulty === 'weak') ? null : cpuFindBetterGround(this, difficulty);
                            if (moveTargetX !== null && Math.abs(moveTargetX - this.x) > 15) {
                                this.cpuMoveTargetX = moveTargetX; this.cpuTurnState = 'moving';
                            } else {
                                this.cpuTurnState = 'aim_decide';
                            }
                            return;
                        }

                        // 🚶 フェーズ2：高台へ向けて実際に移動する（人間の移動と同じ速度・ガソリン消費）
                        if (this.cpuTurnState === 'moving') {
                            let dx = this.cpuMoveTargetX - this.x;
                            if (Math.abs(dx) < 6 || this.gas < 0.5) { this.cpuTurnState = 'aim_decide'; return; }
                            let dir = dx > 0 ? 1 : -1;
                            let turnCost = 20 - this.climbLimit;
                            if (dir === 1 && this.facingDir === -1) {
                                if (this.gas >= turnCost) { this.gas -= turnCost; this.facingDir = 1; this.angle = -Math.PI - this.angle; } else { this.cpuTurnState = 'aim_decide'; }
                                return;
                            }
                            if (dir === -1 && this.facingDir === 1) {
                                if (this.gas >= turnCost) { this.gas -= turnCost; this.facingDir = -1; this.angle = -Math.PI - this.angle; } else { this.cpuTurnState = 'aim_decide'; }
                                return;
                            }
                            if (this.gas >= 0.4) {
                                let beforeX = this.x;
                                this.gas -= 0.4;
                                if (isInIceZone(this.x, this.y)) this.hp = Math.max(0, this.hp - 0.2);
                                let prevX = this.x; this.x += dir * 2.5; this.updatePosition(true, prevX);
                                // 🌟 壁や段差でupdatePositionが位置を押し戻した場合、位置がほぼ変化しない。
                                // これが続く(=詰まっている)場合は移動を諦めて照準フェーズへ進む
                                if (Math.abs(this.x - beforeX) < 0.1) {
                                    this.cpuStuckCount = (this.cpuStuckCount || 0) + 1;
                                    if (this.cpuStuckCount > 5) { this.cpuTurnState = 'aim_decide'; this.cpuStuckCount = 0; return; }
                                } else { this.cpuStuckCount = 0; }
                            } else { this.cpuTurnState = 'aim_decide'; }
                            return;
                        }

                        // 🎯 フェーズ3：狙いを決定する（既存の照準ロジック。角度・パワーは目標値として保存するだけ）
                        if (this.cpuTurnState === 'aim_decide') {
                            let target = this.cpuTarget; let difficulty = this.cpuDifficultyCached;
                            if (!target) { this.cpuTargetAngle = this.angle; this.cpuTargetPower = 4; this.cpuPauseTimer = 20; this.cpuTurnState = 'rotating'; return; }

                            let turnCost = 20 - this.climbLimit;
                            if (target.x < this.x && this.facingDir === 1) {
                                if (this.gas >= turnCost) { this.gas -= turnCost; this.facingDir = -1; this.angle = -Math.PI - this.angle; }
                            } else if (target.x > this.x && this.facingDir === -1) {
                                if (this.gas >= turnCost) { this.gas -= turnCost; this.facingDir = 1; this.angle = -Math.PI - this.angle; }
                            }

                            let usedEscape = false;
                            if ((difficulty === 'strong' || difficulty === 'expert') && isNearLedge(this.x, this.y) && this.ammo["wp4"] > 0) {
                                selWpType = 4; usedEscape = true;
                                this.cpuTargetAngle = this.facingDir === 1 ? -1.0 : Math.PI + 1.0;
                                this.cpuTargetPower = 8;
                            }

                            if (!usedEscape) {
                                let wpChoice = 0;
                                if (difficulty === 'weak') {
                                    wpChoice = 0;
                                } else if (difficulty === 'normal') {
                                    let usable = [0, 0, 1, 2, 3, 4].filter(w => w === 0 || this.ammo["wp" + w] > 0);
                                    wpChoice = usable[Math.floor(Math.random() * usable.length)];
                                } else {
                                    let usable = [0, 1, 2, 3, 4, 5, 5].filter(w => w === 0 || this.ammo["wp" + w] > 0);
                                    wpChoice = usable[Math.floor(Math.random() * usable.length)];
                                }
                                if (wpChoice === 5 && this.charKey === "CA-01") wpChoice = 0;
                                selWpType = wpChoice;

                                if (difficulty === 'weak') {
                                    let baseAng = Math.atan2((target.y - 22) - (this.y - 14), target.x - this.x);
                                    this.cpuTargetAngle = baseAng + (Math.random() * 0.7 - 0.35);
                                    this.cpuTargetPower = 4 + Math.random() * 6;
                                } else {
                                    let best = cpuFindBestShot(this.x, this.y - 14, target.x, target.y - 22, this.facingDir, window.G.windPower);
                                    let jitter = difficulty === 'normal' ? 0.12 : (difficulty === 'strong' ? 0.05 : 0.012);
                                    let powerJitter = difficulty === 'normal' ? 1.2 : (difficulty === 'strong' ? 0.5 : 0.1);
                                    this.cpuTargetAngle = best.angle + (Math.random() * jitter * 2 - jitter);
                                    this.cpuTargetPower = Math.max(2, Math.min(12, best.power + (Math.random() * powerJitter * 2 - powerJitter)));
                                }
                            }
                            this.cpuPauseTimer = 25 + Math.random() * 20; // 🌟 狙いを定めてから撃つまでの「間」(約0.4〜0.7秒)
                            this.cpuTurnState = 'rotating';
                            return;
                        }

                        // 🔄 フェーズ4：目標角度・パワーへなめらかに近づける（瞬間移動させない）
                        if (this.cpuTurnState === 'rotating') {
                            let diff = this.cpuTargetAngle - this.angle;
                            while (diff > Math.PI) diff -= Math.PI * 2;
                            while (diff < -Math.PI) diff += Math.PI * 2;
                            this.angle += diff * 0.15;
                            this.chargePower += (this.cpuTargetPower - this.chargePower) * 0.15;
                            this.isCharging = true; // パワーバー表示用
                            if (Math.abs(diff) < 0.02 && Math.abs(this.cpuTargetPower - this.chargePower) < 0.3) {
                                this.angle = this.cpuTargetAngle; this.chargePower = this.cpuTargetPower;
                                this.cpuTurnState = 'pausing';
                            }
                            return;
                        }

                        // ⏸️ フェーズ5：狙いを定めた状態でひと呼吸置いてから発射
                        if (this.cpuTurnState === 'pausing') {
                            this.cpuPauseTimer--;
                            if (this.cpuPauseTimer <= 0) {
                                this.isCharging = false; window.G.isShooting = true;
                                this.fire(this.chargePower);
                                this.cpuTurnState = null; // 次のターンのためリセット
                            }
                            return;
                        }
                    }
                    return;
                }

                let moveLeft = keyInputs.left || padInputs.left; let moveRight = keyInputs.right || padInputs.right;
                let angleUp = keyInputs.up || padInputs.up; let angleDown = keyInputs.down || padInputs.down;
                let firePressed = keyInputs.firePressed || padInputs.firePressed;
                let fireReleased = keyInputs.fireReleased || padInputs.fireReleased;

                let turnCost = 20 - this.climbLimit; 
                if (moveLeft && this.facingDir === 1) {
                    if (this.gas >= turnCost) { this.gas -= turnCost; this.facingDir = -1; this.angle = -Math.PI - this.angle; } else { moveLeft = false; } 
                }
                if (moveRight && this.facingDir === -1) {
                    if (this.gas >= turnCost) { this.gas -= turnCost; this.facingDir = 1; this.angle = -Math.PI - this.angle; } else { moveRight = false; }
                }

                let wasAlreadyCharging = this.isCharging; // 🌟 このフレームの処理が始まる前からチャージ中だったか

                if (firePressed && !window.G.isShooting && bullets.length === 0) {
                    this.isCharging = true; this.chargePower += 0.25 * this.chargeDirection;
                    if (this.chargePower >= 12) { this.chargePower = 12; this.chargeDirection = -1; }
                    if (this.chargePower <= 2) { this.chargePower = 2; this.chargeDirection = 1; }
                }
                
                // 🌟 修正：押した(firePressed)のと同じフレームで離した(fireReleased)判定が来ると、
                // チャージが1回も加算されないまま即発射されてしまう不具合があった。
                // 「前のフレームから既にチャージが継続していた場合」だけ、離す操作で発射できるようにする
                if (fireReleased && wasAlreadyCharging) {
                    keyInputs.fireReleased = false; padInputs.fireReleased = false; this.isCharging = false;
                    if (window.G.isShooting || bullets.length > 0) return; 
                    window.G.isShooting = true; this.fire(this.chargePower);
                    this.chargePower = 2; this.chargeDirection = 1;
                    document.getElementById("powerBar").style.setProperty("--pct", "0%");
                    document.getElementById("powerText").textContent = "パワー: 0%"; return;
                }

                if (!this.isCharging) {
                    if (this.gas >= 0.4 && (moveLeft || moveRight)) {
                        let dir = moveLeft ? -1 : 1; this.gas -= 0.4;
                        // 🧊 氷結ゾーンを移動中はガソリンに加えてHPも消耗する(ガソリン消費の半分)
                        if (isInIceZone(this.x, this.y)) { this.hp = Math.max(0, this.hp - 0.2); }
                        let prevX = this.x; this.x += dir * 2.5; this.updatePosition(true, prevX);
                    }
                    if (this.gas >= 0.2 && (angleUp || angleDown)) {
                        this.gas -= 0.2;
                        if (this.facingDir === 1) {
                            if (angleUp) this.angle -= 0.03; if (angleDown) this.angle += 0.03;
                        } else { 
                            if (angleUp) this.angle += 0.03; if (angleDown) this.angle -= 0.03; 
                        }
                        this.constrainAngle();
                    }
                }
            }

            fire(power) {
                this.lastPower = power; let wp = selWpType || 0;
                
                if (wp === 5 && this.charKey === "BR-03") { 
                    this.hp -= 20; 
                    if (this.hp <= 0) { this.hp = 0; window.G.nextTurn(); return; } 
                }
                if (wp === 5 && this.charKey === "GK-13") { 
                    this.hp = Math.max(1, this.hp - 10); 
                    this.gas = Math.max(0, this.gas - 10); 
                }
                if (wp === 5 && this.charKey === "RT-05") { this.gas = 0; }
                if (wp === 5 && this.charKey === "WF-14") { this.gas = Math.max(0, this.gas - 50); }

                if (this.charKey === "CA-01") {
                    if (wp === 5) { this.nekoCombo = true; this.ammo["wp5"] = 0; selWpType = 0; } 
                    else if (this.nekoCombo) { this.nekoCombo = false; }
                } else { if (wp !== 0) this.ammo["wp" + wp]--; }

                const bx = this.x + Math.cos(this.angle) * 22;
                const by = this.y - 14 + Math.sin(this.angle) * 22;
                let vel = power * 1.30; 
                // 🌟 通常弾・特殊弾(wp0〜4)は全キャラ共通色。固有弾(wp5)だけキャラ別色で見分ける
                let bulletColor = (wp === 5) ? this.color : COMMON_BULLET_COLOR;

                if (wp === 2) { 
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => { if (this.hp > 0) bullets.push(new Bullet(bx, by, Math.cos(this.angle)*vel, Math.sin(this.angle)*vel, bulletColor, 2, this)); }, i * 300);
                    }
                } else {
                    let b = new Bullet(bx, by, Math.cos(this.angle)*vel, Math.sin(this.angle)*vel, bulletColor, wp, this);
                    bullets.push(b);
                }
                if (this.charKey !== "CA-01") selWpType = 0;
                window.G.upWpBtn();
            }

            draw() {
                if (this.hp <= 0 || !this.hasSpawned) return;
                ctx.save(); ctx.translate(this.x, this.y);

                let imgTank = ImageAssets.tanks[this.charKey]; let imgTurret = ImageAssets.turrets[this.charKey];
                let hasImg = imgTank && imgTank.complete && imgTank.width > 0 && imgTurret && imgTurret.complete && imgTurret.width > 0;

                if (hasImg) {
                    // 🌟 サイズ調整：80pxから2割縮小して64pxに。画像下端をピボット(接地点)ちょうどに合わせてめり込みを解消
                    let tankH = 64, tankW = tankH * (imgTank.width / imgTank.height);
                    let turretW = 48, turretH = turretW * (imgTurret.height / imgTurret.width);

                    ctx.save(); if (this.facingDir === 1) ctx.scale(-1, 1);
                    ctx.save(); ctx.translate(0, -14); // 🌟 fire()の弾発射ピボット(this.y - 14)と完全に一致させる。頭に隠れないようさらに少し上げた
                    let relativeAngle = this.facingDir === 1 ? Math.PI - this.angle : this.angle;
                    ctx.rotate(relativeAngle); ctx.drawImage(imgTurret, -10, -turretH / 2, turretW, turretH); ctx.restore();
                    // 🌟 -tankHで描画(=画像の下端がちょうどy=0のピボットに接する。これ以上下にはみ出さない)
                    ctx.drawImage(imgTank, -tankW / 2, -tankH, tankW, tankH); ctx.restore();
                } else {
                    // 🌟 画像未ロード時のフォールバック：こちらも下端をピボットに揃えて描画
                    ctx.strokeStyle = "#444"; ctx.lineWidth = 5;
                    ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(Math.cos(this.angle)*35, -20 + Math.sin(this.angle)*35); ctx.stroke();
                    ctx.fillStyle = this.color; ctx.fillRect(-26, -18, 52, 12); 
                    ctx.fillStyle = "#333"; ctx.fillRect(-30, -6, 60, 6);
                }

                if (selectedRuleMode === 'team') {
                    ctx.fillStyle = this.team === "Red" ? "#ff4d4d" : this.team === "Blue" ? "#4d94ff" : this.team === "Yellow" ? "#ffdd4d" : "#4dff4d";
                    ctx.beginPath(); ctx.arc(0, -64, 4, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = "#fff";
                } else {
                    // 🌟 個人戦では全員が同じ白丸になり意味を持たないため、丸は出さず名前をキャラ固有色にして見分けやすくする
                    ctx.fillStyle = this.color;
                }
                ctx.font = "10px sans-serif"; ctx.textAlign = "center"; ctx.fillText(this.name, 0, -78);

                if (window.G && window.G.tanks[window.G.turnIdx] === this && !window.G.isIntro && !window.G.isGameOver) {
                    let bobbing = Math.sin(performance.now() * 0.01) * 3; 
                    ctx.fillStyle = "#ff3333";
                    ctx.beginPath(); ctx.moveTo(0, -96 + bobbing); ctx.lineTo(-6, -104 + bobbing); ctx.lineTo(6, -104 + bobbing); ctx.closePath(); ctx.fill();
                }
                ctx.restore();
            }
        }

        class Game {
            constructor(configs) {
                buildTerrainFromLoadedImage(ImageAssets.stages[selectedStageObj.id]);
                this.isIntro = true; this.tanks = []; introPlanes = []; supplyItems = []; visualEffects = [];
                configs.forEach((cfg) => {
                    let randX = 150 + Math.random() * (canvas.width - 300);
                    let pName = cfg.type === 'HUMAN' ? `${cfg.id}P:${CharacterData[cfg.charKey].name}` : `🤖:${CharacterData[cfg.charKey].name}`;
                    let t = new Tank(0, cfg.charKey, pName, `P${cfg.id}`, cfg.type === 'CPU', cfg.team, cfg.id);
                    t.cpuDifficulty = cfg.difficulty || 'normal'; // 🌟 CPUの強さ(weak/normal/strong/expert)
                    this.tanks.push(t); introPlanes.push(new IntroPlane(randX, t));
                });
                this.turnIdx = 0; this.isShooting = false; this.turnTimer = 30; this.windPower = 0;
                this.lastTime = performance.now(); this.isGameOver = false; this.frogTracker = null;
            }

            updatePowerMarker(tank) {
                const marker = document.getElementById("powerMarker");
                if (tank && !tank.isCpu && tank.lastPower !== null) {
                    let pct = ((tank.lastPower - 2) / 10) * 100; marker.style.setProperty("--pct", `${pct}%`); marker.style.display = "block";
                } else { marker.style.display = "none"; }
            }

            startTurn() {
                if (this.isIntro || this.isGameOver) return;
                let currentTank = this.tanks[this.turnIdx]; currentTank.nekoCombo = false;
                currentTank.cpuTurnState = null; // 🌟 CPUの思考フェーズをターンごとにリセット
                currentTank.gas = Math.min(currentTank.maxGas, currentTank.gas + 30);
                this.turnTimer = 30; this.isShooting = false;
                // 🌟 風は毎ターン「前の値からの差分変化」。仕様：50%変化なし／35%±1／11%±2／4%突風(±k~6)、最大±6でクランプ
                this.windPower = updateWindPower(this.windPower);
                this.updatePowerMarker(currentTank);
                setGameMessage(`🎮 ${currentTank.name} のターン！`);
                selWpType = 0; this.upWpBtn();
                
                let currentLimit = MapConfigs[selectedStageObj.type]?.maxItems ?? 3;
                let dropRate = MapConfigs[selectedStageObj.type]?.dropRate ?? 0.25;
                if (Math.random() < dropRate && supplyItems.length < currentLimit) {
                    let randX = 100 + Math.random() * (canvas.width - 200);
                    let type = rollItemBoxType();
                    introPlanes.push(new ItemDropPlane(randX, type));
                }
            }

            nextTurn() {
                bullets = []; this.isShooting = false; this.frogTracker = null;
                this.tanks.forEach(t => { t.isCharging = false; }); // 🌟 念のため、チャージ状態の残留を防ぐ
                let alive = this.tanks.filter(t => t.hp > 0);
                let isFinished = (selectedRuleMode === 'team')
                    ? new Set(alive.map(t => t.team)).size <= 1 // 🌟 チーム戦：残りチームが1つ以下になったら終了
                    : alive.length <= 1;                         // 個人戦：残り1人になったら終了
                if (isFinished) { this.checkGameOver(); return; }
                do { this.turnIdx = (this.turnIdx + 1) % this.tanks.length; } while (this.tanks[this.turnIdx].hp <= 0);
                this.startTurn();
            }

            clickPassBtn() { if (!this.isShooting && bullets.length === 0) this.nextTurn(); }
            
            selWp(type) {
                let currentTank = this.tanks[this.turnIdx];
                if (currentTank.nekoCombo && type !== 0) return;
                if (type !== 0 && currentTank.ammo["wp" + type] <= 0) { setGameMessage(`⚠️ 弾切れです！`); return; }
                selWpType = type; this.upWpBtn(); canvas.focus();
            }

            upWpBtn() {
                let currentTank = this.tanks[this.turnIdx]; if (!currentTank) return;
                const names = ["通常弾", "狙撃弾", "三連弾", "鉄球弾", "ワープ弾", "固有弾"];
                for (let i = 0; i <= 5; i++) {
                    const btn = document.getElementById(`wp${i}`); if (!btn) continue;
                    if (i === 0) { btn.disabled = currentTank.isCpu; btn.classList.toggle("active", selWpType === 0); }
                    else {
                        let num = currentTank.ammo["wp" + i]; btn.innerText = `${names[i]}(${num})`;
                        if (currentTank.charKey === "CA-01" && currentTank.nekoCombo) { btn.disabled = true; } 
                        else { btn.disabled = (num <= 0 || currentTank.isCpu); }
                        btn.classList.toggle("active", selWpType === i);
                    }
                }
            }

            checkGameOver() {
                let alive = this.tanks.filter(t => t.hp > 0); this.isGameOver = true;
                let winMsg;
                if (alive.length === 0) { winMsg = `💀 引き分けです。`; }
                else if (selectedRuleMode === 'team') { winMsg = `🏆 【${alive[0].team}チーム】 の大勝利！！！`; }
                else { winMsg = `🏆 【${alive[0].name}】 の大勝利！！！`; }
                setGameMessage(winMsg);
                document.getElementById("returnMenuBtn").style.display = "block";
            }

            update() {
                let now = performance.now(); let dt = (now - this.lastTime) / 1000; this.lastTime = now;
                if (this.isIntro) {
                    let finished = true; introPlanes.forEach(p => { p.update(); if(!p.hasDropped) finished = false; });
                    this.tanks.forEach(t => { if(t.hasSpawned) t.update(false); if(t.isDropping || !t.hasSpawned) finished = false; });
                    if (finished) { this.isIntro = false; this.startTurn(); } return;
                }
                let currentTank = this.tanks[this.turnIdx]; let isNekoComboing = (currentTank && currentTank.charKey === "CA-01" && currentTank.nekoCombo);
                if (!this.isShooting && bullets.length === 0 && !isNekoComboing) { this.turnTimer -= dt; if (this.turnTimer <= 0) { this.nextTurn(); return; } }
                
                this.tanks.forEach((t, idx) => { if(t.hasSpawned) t.update(idx === this.turnIdx); });
                // 💥 撃破検知：HPが0になった瞬間を捉えて演出＋シェイクを発火（1体につき1回だけ）
                this.tanks.forEach(t => {
                    if (t.hp <= 0 && t.hasSpawned && !t.koEffectShown) {
                        t.koEffectShown = true;
                        visualEffects.push(new KillEffect(t.x, t.y - 40));
                        screenShakeIntensity = Math.max(screenShakeIntensity, 12);
                    }
                });
                // 🌟 アイテムの重力更新：フレームに1回だけ実行(戦車の数だけ重複実行され重力が過剰加速するのを防ぐ)。
                // 戦車と同じ加速式(vy += 0.25)で、ゆっくり加速しながら落ちる
                for (let i = supplyItems.length - 1; i >= 0; i--) {
                    let item = supplyItems[i]; let itx = Math.floor(item.x);
                    if (item.vy === undefined) item.vy = 0;
                    if (itx >= 0 && itx < canvas.width) {
                        let itemSurfaceY = findSurfaceY(itx, item.y);
                        if (item.y < itemSurfaceY) {
                            item.vy += 0.25 * (selectedStageObj.gravity || 1.0); item.y += item.vy;
                            if (item.y > itemSurfaceY) { item.y = itemSurfaceY; item.vy = 0; }
                        } else { item.vy = 0; }
                    }
                    if (item.y > canvas.height + 150) { supplyItems.splice(i, 1); } // 🌟 本物の谷間に落ちた場合は消滅させる
                }
                introPlanes.forEach(p => p.update()); 
                for (let i = bullets.length - 1; i >= 0; i--) { bullets[i].update(this.windPower); if (bullets[i].isDead) bullets.splice(i, 1); }
                for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); if (particles[i].life <= 0) particles.splice(i, 1); }
                for (let i = visualEffects.length - 1; i >= 0; i--) { visualEffects[i].update(); if (visualEffects[i].life <= 0) visualEffects.splice(i, 1); }
                
                if (this.isShooting && bullets.length === 0) {
                    if (currentTank && currentTank.charKey === "CA-01" && currentTank.nekoCombo) { this.isShooting = false; selWpType = 0; this.upWpBtn(); } 
                    else { this.isShooting = false; this.nextTurn(); }
                }
            }

            draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 🌟 画面シェイク：背景〜エフェクトまでの「ワールド」部分にだけ適用し、上部スコアボードは固定のまま揺らさない
                let shakeX = 0, shakeY = 0;
                if (screenShakeIntensity > 0.15) {
                    shakeX = (Math.random() * 2 - 1) * screenShakeIntensity;
                    shakeY = (Math.random() * 2 - 1) * screenShakeIntensity;
                    screenShakeIntensity *= 0.85;
                } else { screenShakeIntensity = 0; }
                ctx.save(); ctx.translate(shakeX, shakeY);

                let imgBg = ImageAssets.backgrounds[selectedStageObj.id];
                if (imgBg && imgBg.complete && imgBg.width > 0) { ctx.drawImage(imgBg, 0, 0, canvas.width, canvas.height); }
                else { ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
                // 🌟 地形(M0x.png)はmapCanvasに描画済み。damageTerrain/reshapeColumnで穴あけ・復元が反映される
                ctx.drawImage(mapCanvas, 0, 0);

                // 🧊 氷結ゾーンを地形の上に半透明の水色で重ね描き
                iceZones.forEach(z => {
                    ctx.save(); ctx.globalAlpha = 0.45; ctx.fillStyle = "#aeeeff";
                    ctx.beginPath(); ctx.arc(z.x, z.y - 2, z.r, 0, Math.PI * 2); ctx.fill();
                    ctx.globalAlpha = 0.8; ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 1;
                    ctx.stroke(); ctx.restore();
                });

                treeObjects.forEach(tree => {
                    ctx.save(); ctx.translate(tree.x, tree.y); ctx.rotate(tree.angle);
                    let imgTree = ImageAssets.tree;
                    if (imgTree && imgTree.complete && imgTree.width > 0) {
                        // 🌟 木の総合的な見た目の高さ(幹90+葉の重なり分)に合わせてスケール、根本(画像下端)をpivotに合わせる
                        let drawH = tree.h + 55, drawW = drawH * (imgTree.width / imgTree.height);
                        ctx.drawImage(imgTree, -drawW / 2, -drawH, drawW, drawH);
                    } else {
                        ctx.fillStyle = "#8B4513"; ctx.fillRect(-(tree.w / 6), -tree.h, tree.w / 3, tree.h);
                        ctx.fillStyle = "#228B22"; ctx.fillRect(-(tree.w / 2), -tree.h - 15, tree.w, tree.w);
                        ctx.fillStyle = "#32CD32"; ctx.fillRect(-(tree.w / 3), -tree.h - 25, (tree.w / 3) * 2, tree.w * 0.6);
                    }
                    ctx.restore();
                });

                // 🎁 アイテムの大きさを1.5倍（font 24px）にして描画
                supplyItems.forEach(s => { ctx.save(); ctx.font = "24px sans-serif"; ctx.textAlign = "center"; drawItemEmoji(ctx, s); ctx.restore(); });
                this.tanks.forEach(t => t.draw()); introPlanes.forEach(p => p.draw());
                bullets.forEach(b => { 
                    ctx.save(); ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                    ctx.fillStyle = b.color; ctx.fill();
                    // 🌟 弾の色が背景と同化して見えなくなるのを防ぐため、白+黒の二重縁取りを付ける(明暗どちらの背景でも視認できる)
                    ctx.lineWidth = 2.5; ctx.strokeStyle = "rgba(255,255,255,0.9)"; ctx.stroke();
                    ctx.lineWidth = 1; ctx.strokeStyle = "rgba(0,0,0,0.85)"; ctx.stroke();
                    ctx.restore();
                });
                particles.forEach(p => p.draw()); visualEffects.forEach(e => e.draw());
                
                if (!this.isGameOver && !this.isIntro) {
                    let currentTank = this.tanks[this.turnIdx];
                    let windStr = formatWindDisplay(this.windPower);
                    let infoStr = `⏱️ TIME: ${Math.ceil(this.turnTimer)}s  |  ${windStr}`;
                    if (currentTank && currentTank.charKey === "CA-01" && currentTank.nekoCombo) { infoStr = `🐾 ネコ連続行動中！(残り通常弾 1発)  |  ${windStr}`; }
                    ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(canvas.width/2 - 150, 85, 300, 35);
                    ctx.fillStyle = "#fff"; ctx.font = "bold 13px monospace"; ctx.textAlign = "center"; ctx.fillText(infoStr, canvas.width/2, 106);
                }

                ctx.restore(); // 🌟 シェイクここまで。以降のスコアボードUIは固定表示

                this.tanks.forEach((t, idx) => {
                    let bx = 12 + (idx * 148); if (bx > canvas.width - 150) return;
                    let by = 10;
                    ctx.save(); ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(bx, by, 142, 65);
                    let isMyTurn = (idx === this.turnIdx && !this.isGameOver && !this.isIntro && t.hp > 0);
                    let displayName = t.hp > 0 ? (isMyTurn ? `${t.name} ⚡` : t.name) : `💀 ${t.name}`;
                    
                    ctx.fillStyle = (selectedRuleMode === 'team') ? (t.team === "Red"?"#ff4d4d":this.team === "Blue"?"#4d94ff":this.team === "Yellow"?"#ffdd4d":"#4dff4d") : "#fff";
                    ctx.font = "11px sans-serif"; ctx.textAlign = "center"; ctx.fillText(displayName, bx + 71, by + 17);
                    
                    ctx.fillStyle = "#444"; ctx.fillRect(bx + 8, by + 25, 124, 10);
                    if (t.hp > 0) { ctx.fillStyle = t.hp > 40 ? "#0f0" : "#f33"; ctx.fillRect(bx + 8, by + 25, (t.hp / t.maxHp) * 124, 10); }
                    ctx.fillStyle = "#444"; ctx.fillRect(bx + 8, by + 41, 124, 5);
                    if (t.hp > 0) { ctx.fillStyle = "#ffaa00"; ctx.fillRect(bx + 8, by + 41, (t.gas / t.maxGas) * 124, 5); }
                    
                    if (isMyTurn) { ctx.strokeStyle = "#ff3333"; ctx.lineWidth = 3; ctx.strokeRect(bx - 2, by - 1, 146, 67); }
                    ctx.restore();
                });
            }
        }

        // 🌟 コンパクトモード時に個々のボタンを実際にDOM移動する。元の位置は初回に記録しておき、
        // 通常モードに戻す際はその記録どおりに寸分違わず復元する（IDやイベントはそのまま維持される）。
        const compactMoveIds = ['weaponPanel', 'btnUp', 'btnLeft', 'btnRight', 'btnDown', 'powerGaugeWrapper', 'padFire'];
        let uiOriginalPositions = null;
        function captureOriginalPositions() {
            uiOriginalPositions = compactMoveIds.map(id => {
                let el = document.getElementById(id);
                return { el, parent: el.parentNode, nextSibling: el.nextSibling };
            });
        }

        function applyCompactLayout(isCompact) {
            if (!uiOriginalPositions) captureOriginalPositions();
            const leftControls = document.getElementById('leftControls');
            const rightControls = document.getElementById('rightControls');
            const bottomBar = document.getElementById('bottomBar');
            const moveRow = document.getElementById('moveRow');

            if (isCompact) {
                // 🌟 左：武器パネル（2列グリッド）＋左右移動（横並びの専用行）
                leftControls.appendChild(document.getElementById('weaponPanel'));
                leftControls.appendChild(moveRow);
                moveRow.appendChild(document.getElementById('btnLeft'));
                moveRow.appendChild(document.getElementById('btnRight'));
                // 🌟 右：砲高/砲低(上)＋発射ボタン(下)
                rightControls.appendChild(document.getElementById('btnUp'));
                rightControls.appendChild(document.getElementById('btnDown'));
                rightControls.appendChild(document.getElementById('padFire'));
                // 🌟 下：横長パワーゲージ
                bottomBar.appendChild(document.getElementById('powerGaugeWrapper'));
            } else {
                uiOriginalPositions.forEach(({ el, parent, nextSibling }) => {
                    if (nextSibling && nextSibling.parentNode === parent) parent.insertBefore(el, nextSibling);
                    else parent.appendChild(el);
                });
            }
            fitCompactCanvas();
        }

        // 🌟 コンパクトモード時、canvasが画面をはみ出さないようJSで実寸を計算してフィットさせる(GBA持ちのイメージ)
        function fitCompactCanvas() {
            const canvasEl = document.getElementById('gameCanvas');
            const outer = document.getElementById('battleOuter');
            const layout = document.getElementById('battleLayout');
            const bottomBarEl = document.getElementById('bottomBar');
            if (!document.body.classList.contains('compact-mode')) {
                canvasEl.style.width = ''; canvasEl.style.height = ''; outer.style.height = ''; bottomBarEl.style.width = '';
                return;
            }
            // 🌟 vh単位はブラウザのアドレスバー等の表示崖とズレて黒帯の原因になるため、実測のwindow高さを使う
            const viewportH = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
            const bottomBarH = bottomBarEl.offsetHeight;
            const outerH = Math.max(120, viewportH - bottomBarH - 10);
            outer.style.height = `${outerH}px`;

            const leftControls = document.getElementById('leftControls');
            const rightControls = document.getElementById('rightControls');
            const availH = layout.clientHeight; // 🌟 メッセージバー分を除いた、battleLayoutの実際の残り高さ
            const availW = layout.clientWidth - leftControls.offsetWidth - rightControls.offsetWidth - 16;
            let w = Math.max(100, availW), h = w / 2; // 1200x600=2:1のアスペクト比を維持
            if (h > availH) { h = Math.max(50, availH); w = h * 2; }
            canvasEl.style.width = `${w}px`; canvasEl.style.height = `${h}px`;
            // 🌟 パワーゲージの幅を画面全体ではなくcanvasの実幅に合わせる(指で隠れる問題の対策)
            bottomBarEl.style.width = `${w}px`;
        }

        function toggleCompactManually() {
            let isCompact = document.body.classList.toggle('compact-mode');
            applyCompactLayout(isCompact);
        }

        // 🌟 横長で縦が低い画面(スマホ横画面など)は自動でコンパクトモードにする。ボタンでも手動切替可能
        function checkAutoCompact() {
            let shouldCompact = window.innerHeight < 500 && window.innerWidth > window.innerHeight;
            if (shouldCompact !== document.body.classList.contains('compact-mode')) {
                document.body.classList.toggle('compact-mode', shouldCompact);
                applyCompactLayout(shouldCompact);
            } else if (shouldCompact) {
                fitCompactCanvas(); // モードは変わらないがウィンドウサイズだけ変わった場合の再フィット
            }
        }
        window.addEventListener('resize', checkAutoCompact);
        if (window.visualViewport) window.visualViewport.addEventListener('resize', checkAutoCompact);
        window.addEventListener('orientationchange', checkAutoCompact);
        checkAutoCompact();

        initHybridInputBinds();
        function startGame() {
            // 🌟 画像読み込み完了前にゲームを開始させない（requestAnimationFrameもこの後でしか走らない）
            if (loadedImages < totalImages) {
                alert(`現在、画像を読み込み中です。少々お待ちください (${loadedImages}/${totalImages})`);
                return;
            }
            document.getElementById("menuScreen").style.display = "none";
            window.G = new Game(finalPlayersSetup); runGame();
        }
        function runGame() { window.G.update(); window.G.draw(); animationFrameId = requestAnimationFrame(runGame); }
    </script>
</body>
</html>
