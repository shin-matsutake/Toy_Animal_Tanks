<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-select=none">
    <title>動物戦車 おもちゃの大乱闘【全キャラ固有弾・調整版】</title>
    <style>
        body { text-align: center; background: #222; color: #fff; font-family: sans-serif; user-select: none; margin: 0; padding: 10px; touch-action: manipulation; }
        #debugLog { background: #020; color: #0f0; border: 2px solid #0f0; padding: 10px; margin: 5px auto; max-width: 1200px; border-radius: 6px; text-align: left; font-family: monospace; font-size: 14px; white-space: pre-wrap; box-sizing: border-box; }
        canvas { background: #87CEEB; border: 3px solid #555; display: block; margin: 5px auto; max-width: 100%; height: auto; }
        
        #menuScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(25, 25, 35, 0.98); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; z-index: 100; overflow-y: auto; padding: 20px 0; box-sizing: border-box; }
        .menu-container { background: #2d2d3d; padding: 25px; border-radius: 16px; border: 4px solid #4e4e6e; max-width: 900px; width: 95%; box-shadow: 0 0 30px rgba(0,0,0,0.8); box-sizing: border-box; }
        h2.title { text-align: center; color: #0ff; margin: 0 0 20px 0; font-size: 24px; text-shadow: 0 0 10px rgba(0,255,255,0.5); }

        /* 🎬 タイトル画面 */
        #titleLogoWrap { position: relative; width: 100%; height: 220px; margin-bottom: 16px; }
        #titleLogoImg { width: 100%; height: 100%; object-fit: contain; }
        #titleLogoFallback { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; align-items: center; justify-content: center; color: #fff; font-size: 20px; font-weight: bold; text-align: center; padding: 10px; box-sizing: border-box; background: #1a5f7a; border-radius: 10px; border: 2px solid #0a3f52; }
        #titleMenuList { display: flex; flex-direction: column; gap: 12px; max-width: 420px; margin: 0 auto; }
        .title-menu-btn { background: #999; border: 2px solid #333; border-radius: 10px; padding: 16px; font-size: 22px; font-weight: bold; text-align: center; cursor: pointer; }
        .title-menu-btn:active { transform: translateY(2px); }

        /* 👥 人数設定画面 */
        #countSettingLayout { display: flex; flex-direction: column; gap: 16px; max-width: 480px; margin: 0 auto 10px; }
        .count-row { display: flex; align-items: center; gap: 14px; background: #222232; border: 2px solid #555575; border-radius: 12px; padding: 12px 16px; }
        .count-icon { font-size: 34px; flex-shrink: 0; }
        .count-value { font-size: 30px; font-weight: bold; color: #fff; width: 40px; text-align: center; flex-shrink: 0; }
        .count-btns { display: flex; gap: 6px; flex-shrink: 0; }
        .count-btn { width: 34px; height: 34px; border-radius: 8px; border: 2px solid #666; background: #444; color: #fff; font-size: 15px; cursor: pointer; }
        .count-btn.plus { background: #2d7a3a; border-color: #1f5a29; }
        .count-btn.minus { background: #7a2d2d; border-color: #5a1f1f; }
        .count-preview { flex: 1; font-size: 18px; letter-spacing: 3px; text-align: right; overflow: hidden; white-space: nowrap; }
        .section-title { color: #ffaa00; border-left: 5px solid #ffaa00; padding-left: 10px; margin: 20px 0 12px 0; text-align: left; font-size: 16px; font-weight: bold; }
        
        .step-panel { display: none; }
        .step-panel.active { display: block; }
        .flex-row { display: flex; gap: 15px; justify-content: center; margin-bottom: 15px; }
        .num-input-group { background: #222232; padding: 15px; border-radius: 10px; border: 2px solid #444; flex: 1; min-width: 140px; }
        .num-input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #ccc; }
        .num-input-group select { width: 100%; background: #444; color: #fff; border: 1px solid #666; padding: 8px; font-size: 16px; border-radius: 6px; }
        .select-btn { flex: 1; background: #3a3a52; border: 2px solid #555575; padding: 15px; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer; text-align: center; font-size: 15px; }
        .select-btn.selected { background: #0056b3; border-color: #0ff; box-shadow: 0 0 10px rgba(0,255,255,0.3); }
        
        .entry-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        @media (max-width: 800px) { .entry-list { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 450px) { .entry-list { grid-template-columns: repeat(1, 1fr); } }
        .entry-card { background: #222232; border: 2px solid #555575; padding: 12px; border-radius: 12px; text-align: left; }
        .entry-card .avatar-placeholder { height: 50px; background: #1a1a26; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; color: #666; font-size: 12px; border: 1px dashed #444; }
        .entry-card select { background: #333; color: #fff; border: 1px solid #555; width: 100%; margin-top: 6px; padding: 6px; font-size: 13px; border-radius: 6px; }
        
        .nav-btn { width: 100%; background: #28a745; color: white; border: none; padding: 14px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 15px; }
        .nav-btn.prev { background: #6c757d; }

        /* 🎨 キャラクター選択画面 */
        #charSelectLayout { display: flex; gap: 12px; margin-bottom: 16px; }
        #charDetailPanel { flex: 0 0 210px; background: #1a1a26; border: 2px solid #555575; border-radius: 12px; padding: 12px; text-align: left; }
        #charDetailTopRow { display: flex; gap: 10px; align-items: flex-start; }
        #charDetailImgWrap { flex: 0 0 64px; width: 64px; height: 64px; background: #222232; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #charDetailImgWrap img { max-width: 100%; max-height: 100%; }
        #charDetailTopInfo { flex: 1; min-width: 0; }
        #charDetailName { font-size: 15px; font-weight: bold; color: #ffaa00; line-height: 1.3; }
        .stat-row { display: flex; justify-content: space-between; margin: 3px 0; font-size: 12px; }
        .stat-label { color: #aaa; }
        .stat-stars { color: #ffdd00; letter-spacing: 1px; }
        #charDetailUlt { margin-top: 8px; border-top: 1px solid #444; padding-top: 6px; }
        #charDetailUltName { font-weight: bold; color: #0ff; margin-bottom: 4px; font-size: 13px; }
        #charDetailUltDesc { font-size: 11px; color: #ccc; white-space: pre-line; line-height: 1.5; }

        #charGrid { flex: 1; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; align-content: start; }
        .char-cell { background: #222232; border: 2px solid #555575; border-radius: 8px; padding: 4px; text-align: center; cursor: pointer; user-select: none; touch-action: none; position: relative; }
        .char-cell.selected { border-color: #0ff; box-shadow: 0 0 8px rgba(0,255,255,0.6); }
        .char-cell img { width: 100%; height: 55px; object-fit: contain; pointer-events: none; }
        .char-cell .char-cell-label { font-size: 10px; color: #ccc; margin-top: 2px; pointer-events: none; }

        #assignSlots { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
        @media (max-width: 800px) { #assignSlots { grid-template-columns: repeat(2, 1fr); } }
        .assign-slot { background: #222232; border: 2px dashed #555575; border-radius: 10px; padding: 8px; min-height: 100px; text-align: center; }
        .assign-slot.inactive { opacity: 0.25; pointer-events: none; }
        .assign-slot.drag-over { border-color: #0f0; background: #1a3a1a; }

        /* 📱 縦長スマホ向け：詳細パネルとグリッドの横並びをやめ、縦積みにして幅を確保する */
        @media (max-width: 600px) {
            #charSelectLayout { flex-direction: column; }
            #charDetailPanel { flex: none; width: 100%; box-sizing: border-box; }
            #charGrid { grid-template-columns: repeat(4, 1fr); }
            .char-cell img { height: 42px; }
        }
        @media (max-width: 420px) {
            #charGrid { grid-template-columns: repeat(3, 1fr); }
        }
        .assign-slot .player-type-label { font-size: 10px; color: #0ff; font-weight: bold; }
        .assign-slot input.player-name-input { width: 100%; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; font-size: 12px; text-align: center; margin-bottom: 4px; padding: 2px; box-sizing: border-box; }
        .assign-slot .assign-img { width: 42px; height: 42px; object-fit: contain; margin: 2px auto; display: block; pointer-events: none; }
        .assign-slot .assign-char-label { font-size: 11px; color: #fff; pointer-events: none; }
        .assign-slot .team-swatch { width: 20px; height: 20px; border-radius: 50%; margin: 4px auto; cursor: pointer; border: 2px solid #fff; }
        .assign-slot .cpu-diff-row { display: flex; align-items: center; justify-content: center; gap: 4px; font-size: 11px; margin-top: 2px; }
        .assign-slot .cpu-diff-row button { background: #444; color: #fff; border: 1px solid #666; border-radius: 4px; width: 20px; height: 20px; cursor: pointer; }

        .char-drag-ghost { position: fixed; pointer-events: none; z-index: 999; width: 50px; height: 50px; opacity: 0.85; transform: translate(-50%, -50%); }

        /* 🗺️ ステージ選択画面 */
        #stageSelectLayout { display: flex; gap: 12px; margin-bottom: 16px; }
        #stageDetailPanel { flex: 0 0 240px; background: #1a1a26; border: 2px solid #555575; border-radius: 12px; padding: 14px; text-align: left; }
        #stageDetailImgWrap { width: 100%; height: 130px; background: #222232; border-radius: 8px; overflow: hidden; }
        #stageDetailImgWrap img { width: 100%; height: 100%; object-fit: cover; }
        #stageDetailName { font-size: 17px; font-weight: bold; color: #ffaa00; margin: 8px 0 4px; }
        #stageDetailDesc { font-size: 11px; color: #ccc; white-space: pre-line; line-height: 1.5; }
        #stageGrid { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; align-content: start; }
        .stage-cell { background: #222232; border: 2px solid #555575; border-radius: 8px; overflow: hidden; cursor: pointer; height: 68px; position: relative; }
        .stage-cell.selected { border-color: #0ff; box-shadow: 0 0 8px rgba(0,255,255,0.6); }
        .stage-cell img { width: 100%; height: 100%; object-fit: cover; }
        .team-Red { color: #ff4d4d; } .team-Blue { color: #4d94ff; } .team-Yellow { color: #ffdd4d; } .team-Green { color: #4dff4d; }
        
        #battleUiContainer { max-width: 1200px; margin: 5px auto; background: #333; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        #weaponPanel { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-bottom: 8px; background: #222; padding: 6px; border-radius: 6px; }
        .wpBtn { background: #444; color: #fff; border: 2px solid #666; padding: 6px 12px; font-size: 13px; font-weight: bold; border-radius: 4px; cursor: pointer; flex: 1; min-width: 100px; max-width: 150px; }
        .wpBtn.active { background: #0056b3; border-color: #0ff; box-shadow: 0 0 8px rgba(0,255,255,0.5); }
        #passBtn { background: #422; color: #ff4; font-weight: bold; border: 2px solid #833; padding: 6px 12px; font-size: 13px; border-radius: 4px; cursor: pointer; }

        /* 🌟 通常モード：旧来の3カラムグリッド（左=移動、中央=パワーゲージ+発射、右=砲高/砲低） */
        #controlPanelGrid { display: grid; grid-template-columns: 0.9fr 1.4fr 0.9fr; gap: 10px; align-items: stretch; background: #252525; padding: 10px; border-radius: 8px; }
        .move-row { display: flex; gap: 6px; width: 100%; height: 100%; }
        .angle-column { display: flex; flex-direction: column; gap: 4px; width: 100%; height: 100%; }
        #centerControls { display: flex; flex-direction: column; gap: 6px; align-items: center; width: 100%; height: 100%; }

        .padBtn { background: #555; color: white; border: 2px solid #777; border-radius: 8px; font-size: 16px; font-weight: bold; padding: 4px 0; cursor: pointer; text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 3px #333; }
        .padBtn:active { transform: translateY(2px); box-shadow: 0 1px #111; }
        .padSub { display: block; font-size: 9px; font-weight: normal; opacity: 0.8; }

        #powerGaugeWrapper { position: relative; width: 100%; height: 28px; background-color: #111; border-radius: 4px; overflow: hidden; border: 1px solid #555; flex-shrink: 0; }
        #powerBar { height: 100%; width: var(--pct, 0%); background: linear-gradient(90deg, #ff9100, #ff3d00); }
        #powerMarker { position: absolute; top: 0; left: var(--pct, 0%); width: 4px; height: 100%; background-color: rgba(25, 25, 255, 0.75); box-shadow: 0 0 6px #fff; display: none; pointer-events: none; }
        #powerText { position: absolute; top: 0; left: 10px; line-height: 28px; font-size: 13px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000; white-space: nowrap; }

        #padFire { background: #d9534f; border: 2px solid #d43f3a; width: 100%; flex: 1; font-size: 14px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px #962d2a; box-sizing: border-box; min-height: 60px; padding: 5px; }
        #returnMenuBtn { display: none; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); background: #ffaa00; color: #000; border: 4px solid #fff; padding: 18px 36px; font-size: 22px; font-weight: bold; border-radius: 12px; cursor: pointer; z-index: 150; box-shadow: 0 0 20px rgba(0,0,0,0.8); }

        body.compact-mode { padding: 0; }
        /* 🌟 スマホ横画面対策：ボタンで手動切替、または画面が横長&低いときは自動で切り替わる。
           左(武器+左右移動)・中央(canvas)・右(砲高/砲低+発射)・下(横長パワーゲージ)にJSでDOM要素ごと移動する */
        #battleLayout { display: block; }
        #leftControls, #rightControls, #bottomBar, #moveRow, #compactMessageBar { display: none; }
        #compactToggleBtn { position: fixed; top: 6px; right: 6px; z-index: 90; background: #444; color: #fff; border: 2px solid #777; border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer; opacity: 0.85; }
        body.compact-mode #debugLog { display: none; }
        body.compact-mode #battleUiContainer { display: none; }
        body.compact-mode #battleOuter { display: flex; flex-direction: column; height: 88vh; min-height: 0; }
        body.compact-mode #compactMessageBar { display: block; flex-shrink: 0; background: rgba(0,20,0,0.85); border: 2px solid #0f0; border-radius: 6px; color: #0f0; font-weight: bold; font-size: 15px; text-align: center; padding: 5px 8px; margin-bottom: 4px; min-height: 20px; }
        body.compact-mode #battleLayout { display: flex; flex-direction: row; align-items: stretch; justify-content: center; gap: 6px; max-width: 100%; margin: 0 auto; flex: 1; min-height: 0; height: auto; }
        body.compact-mode #leftControls { display: flex; flex-direction: column; justify-content: flex-start; gap: 5px; width: 130px; flex-shrink: 0; background: #333; padding: 5px; border-radius: 8px; overflow: hidden; }
        body.compact-mode #rightControls { display: flex; flex-direction: column; align-items: stretch; justify-content: flex-end; gap: 6px; width: 90px; flex-shrink: 0; background: #333; padding: 6px; border-radius: 8px; }
        /* 🌟 canvasは画面に収まるサイズへJSで実寸を計算して当てる(fitCompactCanvas)。ここは中央寄せの土台のみ */
        body.compact-mode #gameCanvas { flex: 0 1 auto; min-width: 0; min-height: 0; margin: auto; }
        /* 🌟 武器パネルは2列グリッドにして縦の占有を圧縮する（通常弾ボタンが画面外にはみ出さないように） */
        body.compact-mode #weaponPanel { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; margin-bottom: 0; flex-shrink: 0; }
        body.compact-mode .wpBtn { min-width: unset; max-width: unset; font-size: 10px; padding: 3px 2px; flex: unset; }
        body.compact-mode #passBtn { grid-column: 1 / span 2; font-size: 11px; padding: 4px; }
        /* 🌟 左右移動は横並びの専用行にまとめ、最小高さを保証して潰れないようにする */
        body.compact-mode #moveRow { display: flex; gap: 4px; flex-shrink: 0; }
        body.compact-mode #moveRow .padBtn { flex: 1; min-height: 44px; }
        body.compact-mode #btnUp, body.compact-mode #btnDown { flex: 0 0 auto; height: 42px; font-size: 13px; }
        /* 🌟 発射ボタンは少し小さめに。上下ボタンの下(=右カラムの下側)に配置 */
        body.compact-mode #padFire { min-height: 46px; flex: 0 0 auto; font-size: 12px; }
        /* 🌟 パワーゲージは横長のまま画面下部に配置（縦持ち時と同じ見た目） */
        body.compact-mode #bottomBar { display: block; margin: 4px auto 0; flex-shrink: 0; }
        body.compact-mode #powerGaugeWrapper { width: 100%; height: 26px; }
        body.compact-mode #powerBar { height: 100%; width: var(--pct, 0%); background: linear-gradient(90deg, #ff9100, #ff3d00); }
        body.compact-mode #powerMarker { top: 0; left: var(--pct, 0%); width: 4px; height: 100%; }
        body.compact-mode #powerText { writing-mode: initial; top: 0; left: 10px; line-height: 26px; }
    </style>
</head>
<body>

    <div id="debugLog">⏳ 画像アセットを読み込み中...</div>
    <button id="returnMenuBtn" onclick="returnToMenu()">🏠 タイトルメニューに戻る</button>

    <div id="menuScreen">
        <div class="menu-container">
            <div id="stepPanel0" class="step-panel active">
                <div id="titleLogoWrap">
                    <img id="titleLogoImg" src="assets/images/title.png" alt="" onerror="this.style.display='none'; document.getElementById('titleLogoFallback').style.display='flex';">
                    <div id="titleLogoFallback">🐾 動物戦車：おもちゃの大乱闘マルチ 🐾</div>
                </div>
                <div id="titleMenuList">
                    <div class="title-menu-btn" style="color:#ffe14d;" onclick="selectTitleMode('arcade')">アーケード</div>
                    <div class="title-menu-btn" style="color:#ff5b5b;" onclick="selectTitleMode('solo')">バトルロイヤル</div>
                    <div class="title-menu-btn" style="color:#5bb8ff;" onclick="selectTitleMode('team')">チームバトル</div>
                    <div class="title-menu-btn" style="color:#5bdc6a;" onclick="selectTitleMode('options')">オプション</div>
                </div>
            </div>
            <div id="stepPanel1" class="step-panel">
                <div class="section-title">👥 STEP 1: 参戦プレイヤー数の設定（最大8人）</div>
                <div id="countSettingLayout">
                    <div class="count-row">
                        <div class="count-icon">👤</div>
                        <div class="count-value" id="humanCountLabel">1</div>
                        <div class="count-btns">
                            <button class="count-btn minus" onclick="changeCount('human', -1)">➖</button>
                            <button class="count-btn plus" onclick="changeCount('human', 1)">➕</button>
                        </div>
                        <div class="count-preview" id="humanPreview"></div>
                    </div>
                    <div class="count-row">
                        <div class="count-icon">🤖</div>
                        <div class="count-value" id="cpuCountLabel">3</div>
                        <div class="count-btns">
                            <button class="count-btn minus" onclick="changeCount('cpu', -1)">➖</button>
                            <button class="count-btn plus" onclick="changeCount('cpu', 1)">➕</button>
                        </div>
                        <div class="count-preview" id="cpuPreview"></div>
                    </div>
                </div>
                <div class="flex-row">
                    <button class="nav-btn prev" onclick="goToStep(0)">⬅️ タイトルへ</button>
                    <button class="nav-btn" onclick="goToStep(2)">次へ進む ➡️</button>
                </div>
            </div>
            <div id="stepPanel2" class="step-panel">
                <div class="section-title">🎨 タンク選択</div>
                <div id="charSelectLayout">
                    <div id="charDetailPanel">
                        <div id="charDetailTopRow">
                            <div id="charDetailImgWrap"><img id="charDetailImg" src="" alt=""></div>
                            <div id="charDetailTopInfo">
                                <div id="charDetailName">名前</div>
                                <div id="charDetailStats">
                                    <div class="stat-row"><span class="stat-label">耐久力</span><span id="charDetailHp" class="stat-stars"></span></div>
                                    <div class="stat-row"><span class="stat-label">機動力</span><span id="charDetailMove" class="stat-stars"></span></div>
                                </div>
                            </div>
                        </div>
                        <div id="charDetailUlt">
                            <div id="charDetailUltName">固有弾：</div>
                            <div id="charDetailUltDesc"></div>
                        </div>
                    </div>
                    <div id="charGrid"></div>
                </div>
                <div class="section-title">👥 選択済みプレイヤー（キャラを選んでから枠をタップ、またはドラッグ＆ドロップで割り当て）</div>
                <div id="assignSlots"></div>
                <div class="flex-row">
                    <button class="nav-btn prev" onclick="goToStep(1)">⬅️ 戻る</button>
                    <button class="nav-btn" onclick="goToStep(3)">次へ進む ➡️</button>
                </div>
            </div>
            <div id="stepPanel3" class="step-panel">
                <div class="section-title">🗺️ ステージ選択</div>
                <div id="stageSelectLayout">
                    <div id="stageDetailPanel">
                        <div id="stageDetailImgWrap"><img id="stageDetailImg" src="" alt=""></div>
                        <div id="stageDetailName">ステージ名</div>
                        <div id="stageDetailDesc">テキスト編集中</div>
                    </div>
                    <div id="stageGrid"></div>
                </div>
                <div class="flex-row">
                    <button class="nav-btn prev" onclick="goToStep(2)">⬅️ 戻る</button>
                    <button class="nav-btn" style="background:#28a745;" onclick="startGame()">⚔️ 戦闘開始 ⚔️</button>
                </div>
            </div>
        </div>
    </div>

    <div id="battleOuter">
    <div id="compactMessageBar"></div>
    <div id="battleLayout">
    <div id="leftControls"></div>
    <canvas id="gameCanvas" width="1200" height="600" tabindex="1"></canvas>
    <div id="rightControls"></div>
    </div>
    </div>
    <div id="bottomBar"></div>
    <div id="moveRow"></div>

    <div id="battleUiContainer">
        <div id="weaponPanel">
            <button id="wp0" class="wpBtn active" onclick="clickWpBtn(0)">通常弾</button>
            <button id="wp1" class="wpBtn" onclick="clickWpBtn(1)">🎯 狙撃弾(1)</button>

        let finalPlayersSetup = [];

        // 🌟 風：前ターンの値からの差分変化。50%変化なし／35%で±1／11%で±2／4%で突風(±3〜6)。最大±6でクランプ
        // 🌟 風向きを◀/▶の矢印で視覚的に表示する（数値だけでなく強さも一目で分かるように）
        function formatWindDisplay(windPower) {
            if (windPower === 0) return `🍃 WIND: 無風`;
            let arrowCount = Math.min(3, Math.max(1, Math.round(Math.abs(windPower) / 2)));
            let arrow = windPower > 0 ? "▶".repeat(arrowCount) : "◀".repeat(arrowCount);
            return `🍃 WIND: ${arrow} (${Math.abs(windPower)})`;
        }

        function updateWindPower(current) {
            let r = Math.random(); let delta = 0;
            if (r < 0.50) { delta = 0; }
            else if (r < 0.85) { delta = (Math.random() < 0.5 ? -1 : 1); }
            else if (r < 0.96) { delta = (Math.random() < 0.5 ? -2 : 2); }
            else { let gust = 3 + Math.floor(Math.random() * 4); delta = (Math.random() < 0.5 ? -gust : gust); }
            return Math.max(-6, Math.min(6, current + delta));
        }

        // 🌟 CPU AI用：与えられた角度・パワーで実際に弾を撃った場合の着弾点をシミュレーションする
        // (実際のBullet.updateと同じ重力・風の式を使うことで、地形や風を考慮した予測ができる)
        function simulateTrajectory(sx, sy, angle, power, windPower, maxSteps = 500) {
            let vx = Math.cos(angle) * power * 1.30, vy = Math.sin(angle) * power * 1.30;
            let x = sx, y = sy;
            let gravity = 0.25 * (selectedStageObj.gravity || 1.0); // 🌟 ステージ重力を考慮しないとCPUの照準がズレる
            for (let i = 0; i < maxSteps; i++) {
                vx += windPower * 0.15 * 0.05; vy += gravity;
                x += vx; y += vy;
                if (isGround(x, y) || y > canvas.height || x < 0 || x >= canvas.width) return { x, y };
            }
            return { x, y };
        }

        // 🌟 指定した目標に最も近い着弾となる角度・パワーの組を探索する（粗い全探索→周辺を少し絞り込み）
        function cpuFindBestShot(sx, sy, targetX, targetY, facingDir, windPower) {
            let angleMin = facingDir === 1 ? -1.5 : Math.PI - 1.5;
            let angleMax = facingDir === 1 ? 1.5 : Math.PI + 1.5;
            let best = { angle: (angleMin + angleMax) / 2, power: 7, dist: Infinity };
            for (let power = 3; power <= 12; power += 1) {
                for (let a = angleMin; a <= angleMax; a += 0.08) {
                    let land = simulateTrajectory(sx, sy, a, power, windPower);
                    let d = Math.hypot(land.x - targetX, land.y - targetY);
                    if (d < best.dist) best = { angle: a, power, dist: d };
                }
            }
            // 最良候補の周辺だけ少し細かく再探索して精度を上げる
            for (let power = Math.max(2, best.power - 1); power <= Math.min(12, best.power + 1); power += 0.34) {
                for (let a = best.angle - 0.08; a <= best.angle + 0.08; a += 0.02) {
                    let land = simulateTrajectory(sx, sy, a, power, windPower);
                    let d = Math.hypot(land.x - targetX, land.y - targetY);
                    if (d < best.dist) best = { angle: a, power, dist: d };
                }
            }
            return best;
        }

        // 🌟 自分の足元付近に地面が無い(崖際)かどうかを判定する。落下死しそうかどうかのCPU判断に使う
        function isNearLedge(x, y, checkDist = 45) {
            return !isGround(x - checkDist, y + 20) || !isGround(x + checkDist, y + 20);
        }

        // 🌟 CPU AI用：周囲を探索し、今より明確に高い(=有利な)場所があればそのX座標を返す。無ければnull。
        // 高所は「狙われにくく、落下しにくい」という方針(難易度が高いほど積極的に高所を狙う)
        function cpuFindBetterGround(tank, difficulty) {
            let range = (difficulty === 'normal') ? 130 : 230;
            let step = 22;
            let moveChance = (difficulty === 'normal') ? 0.5 : 0.85;
            if (Math.random() > moveChance) return null;

            let bestX = null, bestY = findSurfaceY(tank.x, tank.y);
            for (let dx = -range; dx <= range; dx += step) {
                if (dx === 0) continue;
                let cx = tank.x + dx;
                if (cx < 30 || cx > canvas.width - 30) continue;
                let cy = findSurfaceY(cx, tank.y);
                if (cy > canvas.height) continue; // 奈落は除外
                if (isNearLedge(cx, cy - 2, 30)) continue; // 崖際すぎる場所は避ける
                if (cy < bestY - 20) { bestY = cy; bestX = cx; } // 20px以上高い場所だけを候補にする
            }
            return bestX;
        }

        function checkLineOfSight(startX, startY, endX, endY) {
            let steps = Math.ceil(Math.max(Math.abs(endX - startX), Math.abs(endY - startY)));
            for (let i = 0; i <= steps; i += 4) {
                let t = i / steps;
                let cx = Math.floor(startX + (endX - startX) * t);
                let cy = startY + (endY - startY) * t;
                // 🌟 2Dビットマップ地形対応：高さ配列ではなく、その点が地面かどうかを直接判定
                // （空洞・オーバーハングのあるマップでも正しく視線が通る/遮られる。木の幹もterrainMapに焼き込まれているのでここで自動的に判定される）
                if (isGround(cx, cy)) return false;
            }
            return true;
        }

        function attachCharCellEvents(cell, key) {
            let dragGhost = null; let startX = 0, startY = 0; let dragging = false; let pointerId = null;

            cell.addEventListener('pointerdown', (e) => {
                pointerId = e.pointerId; startX = e.clientX; startY = e.clientY; dragging = false;

                cell.classList.add('selected'); selectedCharForAssign = key; renderCharDetail(key);
                e.preventDefault();
            });
            cell.addEventListener('pointermove', (e) => {
                if (e.pointerId !== pointerId || pointerId === null) return;

                if (!dragging && Math.hypot(dx, dy) > 10) {
                    dragging = true;

                    else { dragGhost.innerText = "🐾"; dragGhost.style.fontSize = "30px"; }
                    document.body.appendChild(dragGhost);
                    cell.setPointerCapture(pointerId);

                if (dragging && dragGhost) {

                    document.querySelectorAll('.assign-slot').forEach(s => s.classList.remove('drag-over'));

        // ============================================================

        function clickWpBtn(type) { if (window.G) window.G.selWp(type); }
        function clickPassBtn() { if (window.G) window.G.clickPassBtn(); }

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        // 🌟 地形は「x座標ごとの高さ」ではなく、画像alphaベースの2Dビットマップで管理
        // （M0x.pngの空中足場・オーバーハング・空洞をそのまま当たり判定に反映するため）
        let terrainMap = []; let bullets = []; let particles = []; let introPlanes = []; let supplyItems = [];
        let visualEffects = []; let treeObjects = []; let screenShakeIntensity = 0;
        let iceZones = []; // 🧊 ペンギン固有弾が残す氷結ゾーン: {x, y, r}
        const COMMON_BULLET_COLOR = "#ffcc00"; // 🌟 通常弾・特殊弾(wp0〜4)共通色。背景に埋もれにくい明るい黄色

        // 🧊 指定座標が氷結ゾーン内かどうかを判定
        function isInIceZone(x, y) {
            for (let z of iceZones) { if (Math.hypot(z.x - x, z.y - y) < z.r) return true; }
            return false;
        }

        // 🎁 アイテム箱を開封する。弾を当てた場合(dirX,dirYは弾の飛来方向の逆)・戦車が踏んだ場合(進行方向)の両方から呼ばれる。
        function openItemBox(item, dirX, dirY) {
            let idx = supplyItems.indexOf(item);
            if (idx === -1 || item.state !== 'box') return;
            supplyItems.splice(idx, 1);

            // 💣 ミミック・爆弾はその場で爆発して終わり(中身のドロップは無い)
            if (item.type === 'mimic' || item.type === 'bomb') {
                damageTerrain(item.x, item.y, 30, 25, null, null);
                visualEffects.push(new RingEffect(item.x, item.y, 40, "rgba(255,120,0,0.8)", "wave"));
                return;
            }

            // 🌟 中身は、その場ではなく少し離れた位置にドロップする(その場だと着地と同時に取得してしまうため)
            let len = Math.hypot(dirX, dirY) || 1;
            let dropX = item.x + (dirX / len) * 45;
            let dropY = item.y + (dirY / len) * 20;
            dropX = Math.max(20, Math.min(canvas.width - 20, dropX));

            if (item.type === 'chest') {
                // 🪆 宝箱：マトリョシカのように、抽選テーブルから再度中身を引いて「新しい箱」としてドロップする
                let resultType = rollItemBoxType();
                supplyItems.push(new SupplyItem(dropX, dropY, resultType, 'box'));
            } else {
                // りんご・救急箱・ガソリン：中身(取得可能な状態)としてドロップする
                supplyItems.push(new SupplyItem(dropX, dropY, item.type, 'revealed'));
            }
        }

        // 地形の見た目＋当たり判定の実体。M0x.pngをそのまま描画し、削れば穴が開く／盛れば復元する。
        const mapCanvas = document.createElement("canvas");
        const mapCtx = mapCanvas.getContext("2d");
        mapCanvas.width = 1200; mapCanvas.height = 600;
        let currentStageImg = null; // reshapeColumn(盛る側)で元画像から復元するために保持

        const keyInputs = { left: false, right: false, up: false, down: false, firePressed: false, fireReleased: false };
        const padInputs = { left: false, right: false, up: false, down: false, firePressed: false, fireReleased: false };

        window.addEventListener("keydown", (e) => {
            if (window.G && (window.G.isIntro || window.G.isShooting || bullets.length > 0)) return; 
            if (e.code === "ArrowLeft")  { keyInputs.left = true;  e.preventDefault(); }
            if (e.code === "ArrowRight") { keyInputs.right = true; e.preventDefault(); }
            if (e.code === "ArrowUp")    { keyInputs.up = true;    e.preventDefault(); }
            if (e.code === "ArrowDown")  { keyInputs.down = true;  e.preventDefault(); }
            if (e.code === "Space" && !keyInputs.firePressed && !keyInputs.fireReleased) { keyInputs.firePressed = true; e.preventDefault(); }
        });
        window.addEventListener("keyup", (e) => {
            if (e.code === "ArrowLeft")  keyInputs.left = false;
            if (e.code === "ArrowRight") keyInputs.right = false;
            if (e.code === "ArrowUp")    keyInputs.up = false;
            if (e.code === "ArrowDown")  keyInputs.down = false;
            if (e.code === "Space") { if (keyInputs.firePressed) { keyInputs.firePressed = false; keyInputs.fireReleased = true; } e.preventDefault(); }
        });

        function initHybridInputBinds() {
            const bindBtn = (id, key) => {
                const btn = document.getElementById(id);
                const press = (e) => { 
                    e.preventDefault(); canvas.focus(); 
                    if(window.G && (window.G.isIntro || window.G.isShooting || bullets.length > 0)) return; 
                    padInputs[key] = true; 
                };
                const release = (e) => { e.preventDefault(); padInputs[key] = false; };
                btn.addEventListener("touchstart", press); btn.addEventListener("touchend", release);
                btn.addEventListener("mousedown", press);  btn.addEventListener("mouseup", release);
                btn.addEventListener("mouseleave", release);
            };
            bindBtn("btnLeft", "left"); bindBtn("btnRight", "right"); bindBtn("btnUp", "up"); bindBtn("btnDown", "down");

            const fBtn = document.getElementById("padFire");
            const fPress = (e) => { 
                e.preventDefault(); canvas.focus(); 
                if(window.G && (window.G.isIntro || window.G.isShooting || bullets.length > 0)) return; 
                if (!padInputs.firePressed && !padInputs.fireReleased) padInputs.firePressed = true; 
            };
            const fRelease = (e) => { e.preventDefault(); if (padInputs.firePressed) { padInputs.firePressed = false; padInputs.fireReleased = true; } };
            fBtn.addEventListener("touchstart", fPress); fBtn.addEventListener("touchend", fRelease);
            fBtn.addEventListener("mousedown", fPress);  fBtn.addEventListener("mouseup", fRelease);
        }

        // 🌟 画像のアルファチャンネルから2Dビットマップ地形を構築する（index.html由来）
        function buildTerrainFromLoadedImage(img) {
            terrainMap = Array.from({ length: canvas.width }, () => new Uint8Array(canvas.height).fill(0));
            currentStageImg = img;
            iceZones = []; // 🧊 対戦開始時に氷結ゾーンをリセット
            mapCtx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
            try {
                if (!img || !img.complete || img.width === 0) throw new Error("image not ready");
                mapCtx.drawImage(img, 0, 0, canvas.width, canvas.height);
                let imgData = mapCtx.getImageData(0, 0, canvas.width, canvas.height).data;
                for (let x = 0; x < canvas.width; x++) {
                    for (let y = 0; y < canvas.height; y++) {
                        let aIdx = (y * canvas.width + x) * 4 + 3;
                        if (imgData[aIdx] > 10) terrainMap[x][y] = 1;
                    }
                }
            } catch (e) {
                // 🌟 画像が万一読めない場合のフォールバック：従来のプロシージャル地形を2D化して継続
                mapCtx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
                mapCtx.fillStyle = "#6b8e23";
                for (let x = 0; x < canvas.width; x++) {
                    let type = selectedStageObj.type;
                    let surfaceY;
                    if (type === 'flat') surfaceY = 450;
                    else if (type === 'canyon') {
                        let mid = canvas.width / 2; let dist = Math.abs(x - mid);
                        surfaceY = Math.max(200, Math.min(canvas.height - 20, 430 + (140 * (1 - dist / mid))));
                    } else {
                        surfaceY = Math.max(150, Math.min(canvas.height - 20, 410 + Math.sin(x * 0.006) * 55 + Math.cos(x * 0.02) * 12));
                    }
                    surfaceY = Math.floor(surfaceY);
                    mapCtx.fillRect(x, surfaceY, 1, canvas.height - surfaceY);
                    for (let y = surfaceY; y < canvas.height; y++) terrainMap[x][y] = 1;
                }
            }
            treeObjects = [];
        }

        // 指定座標が地面（不透明ピクセル）かどうかを判定。空洞・オーバーハングも正しく扱える。
        function isGround(x, y) {
            let tx = Math.floor(x); let ty = Math.floor(y);
            if (tx < 0 || tx >= canvas.width || ty < 0 || ty >= canvas.height) return false;
            return terrainMap[tx][ty] === 1;
        }

        // 🌟 アダプター関数：旧「terrain[x] = 表面のY座標」への参照を置き換える。
        // fromYが既に地面の中ならその地面の"天井"を、空中ならそこから下方向へ最初の地面を探す。
        function findSurfaceY(x, fromY, maxScan = 400) {
            let tx = Math.floor(x);
            if (tx < 0 || tx >= canvas.width) return fromY;
            let y = Math.max(0, Math.min(canvas.height - 1, Math.floor(fromY)));
            if (isGround(tx, y)) {
                let steps = 0;
                while (y > 0 && isGround(tx, y - 1) && steps < maxScan) { y--; steps++; }
                return y;
            } else {
                let steps = 0;
                while (y < canvas.height - 1 && !isGround(tx, y) && steps < maxScan) { y++; steps++; }
                // 🌟 走査した末に地面が見つからなかった（＝奈落）場合は、画面下端を偽の床として返さない。
                // これにより「落下し続けてリングアウトする」という本来の挙動が正しく機能する。
                if (!isGround(tx, y)) return canvas.height + 200;
                return y;
            }
        }

        // 🌟 木を実際に足場(terrainMap)として焼き込む／取り除く。これにより「木の上に乗る」「横向きの木を橋として渡る」が
        // 既存の地形当たり判定システムだけで自然に成立する（Tank側の特別処理は不要）。
        function getTreeTrunkLine(tree) {
            let dirX = Math.sin(tree.angle), dirY = -Math.cos(tree.angle);
            return { x0: tree.x, y0: tree.y, x1: tree.x + dirX * tree.h, y1: tree.y + dirY * tree.h, thickness: tree.w * 0.5 };
        }
        function setTrunkGround(tree, value) {
            let line = getTreeTrunkLine(tree);
            let steps = Math.max(1, Math.ceil(Math.hypot(line.x1 - line.x0, line.y1 - line.y0)));
            let half = Math.ceil(line.thickness / 2);
            for (let s = 0; s <= steps; s++) {
                let t = s / steps;
                let px = line.x0 + (line.x1 - line.x0) * t, py = line.y0 + (line.y1 - line.y0) * t;
                for (let ox = -half; ox <= half; ox++) {
                    for (let oy = -half; oy <= half; oy++) {
                        if (ox * ox + oy * oy > half * half) continue;
                        let x = Math.floor(px + ox), y = Math.floor(py + oy);
                        if (x >= 0 && x < canvas.width && y >= 0 && y < canvas.height) terrainMap[x][y] = value;
                    }
                }
            }
        }

        // 地形を掘る（既存の呼び出しシグネチャ・ダメージ計算ロジックはベース版を完全維持）
        function damageTerrain(cx, cy, radius, maxDmg = 25, subBulletTracker = null, ownerTank = null) {
            if (radius < 0) return 0; // 🌟 radius=0は「地形は削らないが直撃ダメージ判定はしたい」ケース(ゴリラ序盤バウンド等)のため通す
            cx = Math.floor(cx); cy = Math.floor(cy);
            if (cx < -radius || cx >= canvas.width + radius) return 0;
            // 🌟 爆発規模に応じた画面シェイク(小さい弾は控えめ、大きい爆風はしっかり揺れる)
            screenShakeIntensity = Math.max(screenShakeIntensity, Math.min(14, radius * 0.18));

            for (let i = treeObjects.length - 1; i >= 0; i--) {
                let tree = treeObjects[i];
                let line = getTreeTrunkLine(tree);
                let midX = (line.x0 + line.x1) / 2, midY = (line.y0 + line.y1) / 2;
                let distToTree = Math.hypot(midX - cx, midY - cy);
                if (distToTree < (radius + 25)) { setTrunkGround(tree, 0); treeObjects.splice(i, 1); }
            }

            // 🧊 爆風が地形を削った範囲に氷結ゾーンがあれば一緒に消す(地形が変わったので氷も崩れる)
            for (let i = iceZones.length - 1; i >= 0; i--) {
                if (Math.hypot(iceZones[i].x - cx, iceZones[i].y - cy) < (radius + iceZones[i].r)) iceZones.splice(i, 1);
            }

            // ビットマップ上に円形の穴を開ける＋見た目（mapCanvas）も同時にくり抜く
            for (let x = Math.max(0, cx - radius); x < Math.min(canvas.width, cx + radius); x++) {
                for (let y = Math.max(0, cy - radius); y < Math.min(canvas.height, cy + radius); y++) {
                    let dx = x - cx; let dy = y - cy;
                    if (dx * dx + dy * dy <= radius * radius) terrainMap[x][y] = 0;
                }
            }
            mapCtx.save(); mapCtx.globalCompositeOperation = 'destination-out';
            mapCtx.beginPath(); mapCtx.arc(cx, cy, radius, 0, Math.PI * 2); mapCtx.fill(); mapCtx.restore();

            for (let i = 0; i < radius * 0.5; i++) {
                particles.push(new Particle(cx + (Math.random() * radius * 2 - radius), cy + (Math.random() * radius - radius / 2), Math.random() * 4 - 2, Math.random() * -4 - 1, "#ff6600", Math.random() * 3 + 2));
            }
            let totalHitDamage = 0;
            if (window.G) {
                window.G.tanks.forEach(t => {
                    if (t.hp > 0 && t.hasSpawned) {
                        let dist = Math.hypot(t.x - cx, (t.y - 22) - cy);
                        let limitDist = radius + 15; 
                        if (dist < limitDist) {
                            let falloff = (limitDist - dist) / limitDist;
                            let finalDmg = maxDmg * falloff;
                            // 🌟 近距離ボーナス：爆心地の30%以内に着弾した相手には最大+30%
                            if (dist < radius * 0.3) {
                                finalDmg *= 1 + 0.3 * (1 - dist / (radius * 0.3));
                            }
                            // 🌟 高所ボーナス：自分より40px以上低い相手を狙い撃った場合、高低差に応じて最大+25%
                            if (ownerTank && ownerTank.hasSpawned) {
                                let heightDiff = t.y - ownerTank.y; // 正の値＝相手の方が低い(=自分の方が高所)
                                if (heightDiff > 40) {
                                    finalDmg *= 1 + Math.min(0.25, (heightDiff - 40) / 400);
                                }
                            }
                            finalDmg = Math.floor(finalDmg);
                            if (finalDmg > 0) {
                                if (subBulletTracker) {
                                    if (!subBulletTracker.hasHitTanks) subBulletTracker.hasHitTanks = [];
                                    if (subBulletTracker.hasHitTanks.includes(t.id)) {
                                        finalDmg = 3; 
                                    } else {
                                        subBulletTracker.hasHitTanks.push(t.id);
                                    }
                                }
                                t.hp = Math.max(0, t.hp - finalDmg);
                                totalHitDamage += finalDmg;
                                t.checkGroundStatus();
                            }
                        }
                    }
                });
                window.G.tanks.forEach(t => { if(t.hasSpawned) t.checkGroundStatus(); });
            }
            return totalHitDamage;
        }

        // 🦔 1カラム(x座標1列)単位で地表の高さを再構成する（ML-06の掘削／TT-12の盛り土で使用）
        // newSurfaceYが現在より大きい＝掘る、小さい＝盛る、として旧terrain[x]書き換えロジックを再現する
        function reshapeColumn(x, cy, newSurfaceY) {
            x = Math.floor(x);
            if (x < 0 || x >= canvas.width) return;
            let oldSurfaceY = findSurfaceY(x, cy);
            let top = Math.floor(Math.min(oldSurfaceY, newSurfaceY));
            let bottom = Math.floor(Math.max(oldSurfaceY, newSurfaceY));
            if (bottom <= top) return;
            let makeGround = (newSurfaceY < oldSurfaceY);
            for (let y = top; y < bottom; y++) {
                if (y < 0 || y >= canvas.height) continue;
                terrainMap[x][y] = makeGround ? 1 : 0;
            }
            if (makeGround) {
                mapCtx.save(); mapCtx.beginPath(); mapCtx.rect(x, top, 1, bottom - top); mapCtx.clip();
                // 🌟 まず土色で下地を塗る（元画像がここでは透明＝空だった場合の保険）
                mapCtx.globalCompositeOperation = 'source-over';
                mapCtx.fillStyle = "#6b8e23"; mapCtx.fillRect(x, top, 1, bottom - top);
                // その上に元画像を重ねる。元々ここが地形だった場合はそちらの絵柄が優先して見える
                if (currentStageImg && currentStageImg.complete && currentStageImg.width > 0) {
                    mapCtx.drawImage(currentStageImg, 0, 0, canvas.width, canvas.height);
                }
                mapCtx.restore();
            } else {
                mapCtx.save(); mapCtx.globalCompositeOperation = 'destination-out';
                mapCtx.fillRect(x, top, 1, bottom - top); mapCtx.restore();
            }
        }

        class IntroPlane {
            constructor(targetX, tank) { this.x = -150; this.y = 60; this.speed = 12; this.targetX = targetX; this.tank = tank; this.hasDropped = false; }
            update() {
                this.x += this.speed;
                if (!this.hasDropped && this.x >= this.targetX) { 
                    this.hasDropped = true; this.tank.x = this.x; this.tank.y = this.y; this.tank.isDropping = true; this.tank.hasSpawned = true;
                }
            }
            draw() { ctx.fillStyle = "#666"; ctx.fillRect(this.x - 20, this.y - 5, 40, 10); }
        }

        class Particle {
            constructor(x, y, vx, vy, color, size) { this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.color = color; this.size = size; this.life = 1.0; this.decay = Math.random() * 0.04 + 0.02; }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.1; this.life -= this.decay; }
            draw() { if (this.life <= 0) return; ctx.save(); ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
        }

        class RingEffect {
            constructor(x, y, radius, color, type = "wave") { 
                this.x = x; this.y = y; this.targetRadius = radius; this.color = color; this.type = type;
                this.currentRadius = (type === "pull") ? radius : 0; this.life = 1.0; 
            }
            update() { 
                if (this.type === "pull") {
                    this.currentRadius -= this.targetRadius * 0.05;
                    if (this.currentRadius < 5) this.currentRadius = this.targetRadius;
                } else { this.currentRadius += (this.targetRadius - this.currentRadius) * 0.15; }
                this.life -= 0.03; 
            }
            draw() {
                if (this.life <= 0) return;
                ctx.save(); ctx.globalAlpha = this.life; ctx.strokeStyle = this.color; ctx.lineWidth = (this.type === "pull") ? 2 : 4;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.currentRadius, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
            }
        }

        class SupplyItem { constructor(x, y, type, state = 'revealed') { this.x = x; this.y = y; this.type = type; this.state = state; } }
        // 🎁 アイテム箱の抽選テーブル（りんご20% / 救急箱25% / ガソリン20% / 宝箱15% / 爆弾10% / ミミック10%）
        function rollItemBoxType() {
            let r = Math.random() * 100;
            if (r < 20) return "apple";
            if (r < 45) return "medkit";
            if (r < 65) return "gas";
            if (r < 80) return "chest";
            if (r < 90) return "bomb";
            return "mimic";
        }

        // 💥 撃破演出：「KO!」テキストが弾んでフェードアウト＋放射状の破片パーティクル
        class KillEffect {
            constructor(x, y) {
                this.x = x; this.y = y; this.life = 1.0; this.scale = 0.3;
                for (let i = 0; i < 16; i++) {
                    let ang = (Math.PI * 2 / 16) * i;
                    let spd = 3 + Math.random() * 4;
                    particles.push(new Particle(x, y, Math.cos(ang) * spd, Math.sin(ang) * spd - 2, "#ffcc00", Math.random() * 4 + 2));
                }
            }
            update() { this.life -= 0.018; this.scale += (1.3 - this.scale) * 0.2; this.y -= 0.4; }
            draw() {
                if (this.life <= 0) return;
                ctx.save(); ctx.globalAlpha = Math.max(0, this.life); ctx.translate(this.x, this.y); ctx.scale(this.scale, this.scale);
                ctx.font = "bold 32px sans-serif"; ctx.textAlign = "center"; ctx.lineWidth = 6;
                ctx.strokeStyle = "#000"; ctx.strokeText("撃破！", 0, 0);
                ctx.fillStyle = "#ffcc00"; ctx.fillText("撃破！", 0, 0);
                ctx.restore();
            }
        }

        class ItemDropPlane {
            constructor(targetX, itemType) { this.x = -100; this.y = 40; this.speed = 10; this.targetX = targetX; this.itemType = itemType; this.hasDropped = false; }
            update() {
                this.x += this.speed;
                if (!this.hasDropped && this.x >= this.targetX) { this.hasDropped = true; supplyItems.push(new SupplyItem(this.x, 40, this.itemType, 'box')); }

            draw() {

        }

        function drawItemEmoji(ctx, s) {
            // 🎭 ミミックは宝箱と同じ見た目にして、開けるまで区別がつかないようにする
            let visualType = (s.type === 'mimic') ? 'chest' : s.type;
            let img = ImageAssets.items[visualType];
            if (img && img.complete && img.width > 0) {
                let size = 30; // 🌟 正方形(1:1)で描画
                ctx.drawImage(img, s.x - size / 2, s.y - size / 2, size, size);

            }
            let emoji = "🎁";
            if (visualType === "apple") emoji = "🍏";
